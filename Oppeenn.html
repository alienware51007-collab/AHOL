<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Globe Motion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      background: #000;
    }
  </style>
</head>

<body>

  <canvas id="globeCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("globeCanvas");
    const ctx = canvas.getContext("2d");

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const r = 150;

    let tick = 0;

    // ---------------------------
    // Load jr.png (normal activation)
    // ---------------------------
    const faceImg = new Image();
    faceImg.src = "https://raw.githubusercontent.com/alienware51007-collab/AHOL/main/jr.png";

    // ---------------------------
    // Load jrxxyy.png (full-screen activation)
    // ---------------------------
    const fullImg = new Image();
    fullImg.src = "https://raw.githubusercontent.com/alienware51007-collab/AHOL/main/jrxxyy.png";

    // ---------------------------
    // Full-screen activation function (ONLY jrxxyy.png)
    // ---------------------------
    function activateFullScreenImage() {
      const overlay = document.createElement("div");
      overlay.style.position = "fixed";
      overlay.style.top = "0";
      overlay.style.left = "0";
      overlay.style.width = "100vw";
      overlay.style.height = "100vh";
      overlay.style.background = "black";
      overlay.style.display = "flex";
      overlay.style.justifyContent = "center";
      overlay.style.alignItems = "center";
      overlay.style.zIndex = "9999";

      const img = document.createElement("img");
      img.src = fullImg.src;   // ⭐ jrxxyy.png only
      img.style.width = "100%";
      img.style.height = "100%";
      img.style.objectFit = "contain";

      overlay.appendChild(img);

      overlay.addEventListener("click", () => overlay.remove());
      overlay.addEventListener("touchstart", () => overlay.remove());

      document.body.appendChild(overlay);
    }

    // ---------------------------
    // Dampener Face (upper-right)
    // ---------------------------
    function drawDampenerFace() {
      ctx.save();
      ctx.globalAlpha = 0.31;

      const size = 120;
      const x = canvas.width - size - 10;
      const y = 10;

      ctx.drawImage(faceImg, x, y, size, size);
      ctx.restore();
    }

    // ---------------------------
    // 007 POINT SYSTEM
    // ---------------------------
    const points007 = [
      { x: 42,  y: 88,  active: false, locked: false },
      { x: 120, y: 140, active: false, locked: false },
      { x: 200, y: 60,  active: false, locked: false },

      { x: 310, y: 180, active: false, locked: true },
      { x: 260, y: 300, active: false, locked: true },
      { x: 150, y: 250, active: false, locked: true },
      { x: 80,  y: 200, active: false, locked: true },

      // ⭐ bottom-most point (full-screen trigger)
      { x: 330, y: 330, active: false, locked: true },

      { x: 50,  y: 310, active: false, locked: true },
      { x: 210, y: 210, active: false, locked: true }
    ];

    function dropFace(pt) {
      pt.active = true;
    }

    function draw007Points() {
      points007.forEach(pt => {
        if (pt.active) {
          ctx.drawImage(faceImg, pt.x - 20, pt.y - 20, 40, 40);
        } else {
          ctx.fillStyle = "black";
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    // ---------------------------
    // Globe Drawing
    // ---------------------------
    function drawGlobe() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const pulse = Math.sin(tick / 10) * 4;

      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(cx + pulse, cy + pulse, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "white";
      ctx.lineWidth = 1;

      for (let i = -3; i <= 3; i++) {
        const offset = (i / 3) * r * 0.8;
        ctx.beginPath();
        ctx.ellipse(cx + offset + pulse, cy + pulse, r * 0.9, r, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      for (let j = -3; j <= 3; j++) {
        const offset = (j / 3) * r * 0.8;
        ctx.beginPath();
        ctx.ellipse(cx + pulse, cy + offset + pulse, r, r * 0.9, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      draw007Points();
      drawDampenerFace();

      tick++;
    }

    // ---------------------------
    // Hover Detection + Full-screen trigger
    // ---------------------------
    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      drawGlobe();

      points007.forEach(pt => {
        const dx = mx - pt.x;
        const dy = my - pt.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 8) {

          // ⭐ Full-screen trigger ONLY for (330, 330)
          if (pt.x === 330 && pt.y === 330) {
            activateFullScreenImage();
          }

          // Normal jr.png activation
          if (!pt.locked) {
            dropFace(pt);
          }

          ctx.fillStyle = "white";
          ctx.font = "14px monospace";
          ctx.fillText(`(${pt.x}, ${pt.y})`, pt.x + 10, pt.y - 10);
        }
      });
    });

    // ---------------------------
    // Mobile Tap Support
    // ---------------------------
    canvas.addEventListener("click", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      points007.forEach(pt => {
        const dx = mx - pt.x;
        const dy = my - pt.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 8 && pt.x === 330 && pt.y === 330) {
          activateFullScreenImage();
        }
      });
    });

    // ---------------------------
    // Animation Loop
    // ---------------------------
    setInterval(drawGlobe, 400);
    drawGlobe();
  </script>

</body>
</html>
