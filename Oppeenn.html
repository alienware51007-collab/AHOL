<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Globe Motion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      background: #000;
    }
  </style>
</head>

<body>

  <canvas id="globeCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("globeCanvas");
    const ctx = canvas.getContext("2d");

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const r = 150;

    let tick = 0;

    const faceImg = new Image();
    faceImg.src = "https://raw.githubusercontent.com/alienware51007-collab/AHOL/main/jr.png";

    const fullImg = new Image();
    fullImg.src = "https://raw.githubusercontent.com/alienware51007-collab/AHOL/main/jrxxyy.png";

    function activateFullScreenImage() {
      const overlay = document.createElement("div");
      overlay.style.position = "fixed";
      overlay.style.top = "0";
      overlay.style.left = "0";
      overlay.style.width = "100vw";
      overlay.style.height = "100vh";
      overlay.style.background = "black";
      overlay.style.display = "flex";
      overlay.style.justifyContent = "center";
      overlay.style.alignItems = "center";
      overlay.style.zIndex = "9999";

      const img = document.createElement("img");
      img.src = fullImg.src;
      img.style.width = "100%";
      img.style.height = "100%";
      img.style.objectFit = "contain";

      overlay.appendChild(img);

      overlay.addEventListener("click", () => overlay.remove());
      overlay.addEventListener("touchstart", () => overlay.remove());

      document.body.appendChild(overlay);
    }

    function drawDampenerFace() {
      ctx.save();
      ctx.globalAlpha = 0.31;

      const size = 120;
      const x = canvas.width - size - 10;
      const y = 10;

      ctx.drawImage(faceImg, x, y, size, size);
      ctx.restore();
    }

    const points007 = [
      { x: 42,  y: 88,  active: false, locked: false },
      { x: 120, y: 140, active: false, locked: false },
      { x: 200, y: 60,  active: false, locked: false },

      { x: 310, y: 180, active: false, locked: true },
      { x: 260, y: 300, active: false, locked: true },
      { x: 150, y: 250, active: false, locked: true },
      { x: 80,  y: 200, active: false, locked: true },

      { x: 330, y: 330, active: false, locked: true }, // ⭐ full-screen trigger

      { x: 50,  y: 310, active: false, locked: true },
      { x: 210, y: 210, active: false, locked: true }
    ];

    function dropFace(pt) {
      pt.active = true;
    }

    function draw007Points(pulse) {
      points007.forEach(pt => {
        const px = pt.x + pulse;
        const py = pt.y + pulse;

        if (pt.active) {
          ctx.drawImage(faceImg, px - 20, py - 20, 40, 40);
        } else {
          ctx.fillStyle = "black";
          ctx.beginPath();
          ctx.arc(px, py, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function drawGlobe() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const pulse = Math.sin(tick / 10) * 4;

      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(cx + pulse, cy + pulse, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "white";
      ctx.lineWidth = 1;

      for (let i = -3; i <= 3; i++) {
        const offset = (i / 3) * r * 0.8;
        ctx.beginPath();
        ctx.ellipse(cx + offset + pulse, cy + pulse, r * 0.9, r, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      for (let j = -3; j <= 3; j++) {
        const offset = (j / 3) * r * 0.8;
        ctx.beginPath();
        ctx.ellipse(cx + pulse, cy + offset + pulse, r, r * 0.9, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      draw007Points(pulse);

      drawDampenerFace();

      tick++;
    }

    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      const pulse = Math.sin(tick / 10) * 4;

      drawGlobe();

      points007.forEach(pt => {
        const px = pt.x + pulse;
        const py = pt.y + pulse;

        const dx = mx - px;
        const dy = my - py;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 15 && pt.x === 330 && pt.y === 330) {
          activateFullScreenImage();
        }

        if (dist < 8 && !pt.locked) {
          dropFace(pt);
        }
      });
    });

    canvas.addEventListener("click", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      const pulse = Math.sin(tick / 10) * 4;

      points007.forEach(pt => {
        const px = pt.x + pulse;
        const py = pt.y + pulse;

        const dx = mx - px;
        const dy = my - py;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 15 && pt.x === 330 && pt.y === 330) {
          activateFullScreenImage();
        }
      });
    });

    setInterval(drawGlobe, 400);
    drawGlobe();
  </script>

</body>
</html>
