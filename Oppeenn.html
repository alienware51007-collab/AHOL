<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Globe Motion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    canvas {
      background: #000;
    }

    #bottomLeftPhoto {
      position: fixed;
      bottom: 10px;
      left: 10px;
      width: 120px;
      height: auto;
      z-index: 9998;
    }

    #bottomLeftPhoto img {
      width: 100%;
      height: auto;
      opacity: 0.10;
    }
  </style>
</head>

<body>

  <div id="bottomLeftPhoto">
    <img src="https://raw.githubusercontent.com/alienware51007-collab/AHOL/main/zxcv.png">
  </div>

  <canvas id="analysisCanvas" width="400" height="400" style="display:none;"></canvas>
  <canvas id="globeCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("globeCanvas");
    const ctx = canvas.getContext("2d");

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const r = 150;
    let tick = 0;

    let globeColor = "red";

    const faceImg = new Image();
    faceImg.src = "https://raw.githubusercontent.com/alienware51007-collab/AHOL/main/jr.png";

    const fullImg = new Image();
    fullImg.src = "https://raw.githubusercontent.com/alienware51007-collab/AHOL/main/jrxxyy.png";

    // ---------------------------
    // MATLAB-style image analysis
    // ---------------------------
    function matlabLoadImageForAnalysis(img) {
      const ac = document.getElementById("analysisCanvas");
      const actx = ac.getContext("2d");
      actx.drawImage(img, 0, 0, ac.width, ac.height);
      return actx.getImageData(0, 0, ac.width, ac.height);
    }

    function matlabComputeBrightness(imageData) {
      let sum = 0;
      for (let i = 0; i < imageData.data.length; i += 4) {
        const r = imageData.data[i];
        const g = imageData.data[i + 1];
        const b = imageData.data[i + 2];
        sum += (r + g + b) / 3;
      }
      return sum / (imageData.data.length / 4);
    }

    function matlabDominantColor(imageData) {
      let rSum = 0, gSum = 0, bSum = 0;
      const total = imageData.data.length / 4;

      for (let i = 0; i < imageData.data.length; i += 4) {
        rSum += imageData.data[i];
        gSum += imageData.data[i + 1];
        bSum += imageData.data[i + 2];
      }

      return {
        r: Math.round(rSum / total),
        g: Math.round(gSum / total),
        b: Math.round(bSum / total)
      };
    }

    function matlabRuntimeInteraction(brightness, color) {
      if (brightness < 80) globeColor = "darkred";
      else if (brightness < 150) globeColor = "purple";
      else globeColor = "cyan";
    }

    // ---------------------------
    // Natural Spline — Neon Green
    // ---------------------------
    function curveNaturalNeonGreen(points) {
      const result = [];
      for (let i = 0; i < points.length - 1; i++) {
        const p1 = points[i];
        const p2 = points[i + 1];
        for (let t = 0; t < 1; t += 0.05) {
          const x = p1.x + (p2.x - p1.x) * t;
          const y = p1.y + (p2.y - p1.y) * t * t * (3 - 2 * t);
          result.push({ x, y });
        }
      }
      return result;
    }

    function drawSplineOnOverlay(sctx) {
      const splinePoints = [
        { x: 100, y: 600 },
        { x: 300, y: 300 },
        { x: 600, y: 500 },
        { x: 900, y: 250 },
        { x: 1200, y: 700 }
      ];

      const spline = curveNaturalNeonGreen(splinePoints);

      sctx.strokeStyle = "#39FF14";
      sctx.lineWidth = 4;
      sctx.beginPath();

      spline.forEach((pt, index) => {
        if (index === 0) sctx.moveTo(pt.x, pt.y);
        else sctx.lineTo(pt.x, pt.y);
      });

      sctx.stroke();
    }

    // ---------------------------
    // Full-screen activation
    // ---------------------------
    function activateFullScreenImage() {

      fullImg.onload = () => {
        const analysisData = matlabLoadImageForAnalysis(fullImg);
        const brightness = matlabComputeBrightness(analysisData);
        const color = matlabDominantColor(analysisData);

        matlabRuntimeInteraction(brightness, color);
      };

      const overlay = document.createElement("div");
      overlay.style.position = "fixed";
      overlay.style.top = "0";
      overlay.style.left = "0";
      overlay.style.width = "100vw";
      overlay.style.height = "100vh";
      overlay.style.background = "black";
      overlay.style.display = "flex";
      overlay.style.justifyContent = "center";
      overlay.style.alignItems = "center";
      overlay.style.zIndex = "9999";

      const img = document.createElement("img");
      img.src = fullImg.src;
      img.style.width = "100%";
      img.style.height = "100%";
      img.style.objectFit = "contain";
      overlay.appendChild(img);

      // ⭐ NEW: Canvas for spline on jr.xxyy page ⭐
      const splineCanvas = document.createElement("canvas");
      splineCanvas.width = window.innerWidth;
      splineCanvas.height = window.innerHeight;
      splineCanvas.style.position = "absolute";
      splineCanvas.style.top = "0";
      splineCanvas.style.left = "0";
      splineCanvas.style.zIndex = "10000";
      overlay.appendChild(splineCanvas);

      const sctx = splineCanvas.getContext("2d");
      drawSplineOnOverlay(sctx);

      overlay.addEventListener("click", () => overlay.remove());
      overlay.addEventListener("touchstart", () => overlay.remove());

      document.body.appendChild(overlay);
    }

    // ---------------------------
    // Dampener Face
    // ---------------------------
    function drawDampenerFace() {
      ctx.save();
      ctx.globalAlpha = 0.10;
      const size = 120;
      ctx.drawImage(faceImg, canvas.width - size - 10, 10, size, size);
      ctx.restore();
    }

    // ---------------------------
    // 007 Points
    // ---------------------------
    const points007 = [
      { x: 42, y: 88, active: false, locked: false },
      { x: 120, y: 140, active: false, locked: false },
      { x: 200, y: 60, active: false, locked: false },
      { x: 310, y: 180, active: false, locked: true },
      { x: 260, y: 300, active: false, locked: true },
      { x: 150, y: 250, active: false, locked: true },
      { x: 80, y: 200, active: false, locked: true },
      { x: 330, y: 330, active: false, locked: true },
      { x: 50, y: 310, active: false, locked: true },
      { x: 210, y: 210, active: false, locked: true }
    ];

    function dropFace(pt) { pt.active = true; }

    function draw007Points() {
      points007.forEach(pt => {
        if (pt.active) {
          ctx.drawImage(faceImg, pt.x - 20, pt.y - 20, 40, 40);
        } else {
          ctx.fillStyle = "yellow";
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    // ---------------------------
    // Globe Drawing
    // ---------------------------
    function drawGlobe() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const pulse = Math.sin(tick / 10) * 4;

      ctx.fillStyle = globeColor;
      ctx.beginPath();
      ctx.arc(cx + pulse, cy + pulse, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "white";
      ctx.lineWidth = 1;

      for (let i = -3; i <= 3; i++) {
        const offset = (i / 3) * r * 0.8;
        ctx.beginPath();
        ctx.ellipse(cx + offset + pulse, cy + pulse, r * 0.9, r, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      for (let j = -3; j <= 3; j++) {
        const offset = (j / 3) * r * 0.8;
        ctx.beginPath();
        ctx.ellipse(cx + pulse, cy + offset + pulse, r, r * 0.9, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      draw007Points();
      drawDampenerFace();
      tick++;
    }

    // ---------------------------
    // Hover Detection
    // ---------------------------
    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      points007.forEach(pt => {
        const dx = mx - pt.x;
        const dy = my - pt.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 8 && !pt.locked) dropFace(pt);

        if (dist < 8) {
          ctx.fillStyle = "white";
          ctx.font = "14px monospace";
          ctx.fillText(`(${pt.x}, ${pt.y})`, pt.x + 10, pt.y - 10);
        }
      });
    });

    // ---------------------------
    // Click Event
    // ---------------------------
    canvas.addEventListener("click", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      points007.forEach(pt => {
        const dx = mx - pt.x;
        const dy = my - pt.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 10 && pt.x === 330 && pt.y === 330) {
          setTimeout(() => activateFullScreenImage(), 20);
        }
      });
    });

    setInterval(drawGlobe, 400);
    drawGlobe();
  </script>

</body>
</html>
