<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Chatbot + AI Image Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: url("jrxxyy.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #fff;
      font-family: monospace;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0,255,170,0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,170,0.10) 1px, transparent 1px),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 14px);
      background-size: 60px 60px, 60px 60px, 140px 140px;
      filter: blur(2px) brightness(1.1);
      animation: zoomPattern 16s ease-in-out infinite alternate, glowPulse 6s ease-in-out infinite;
    }

    @keyframes zoomPattern {
      0% { transform: scale(1); }
      100% { transform: scale(1.16); }
    }

    @keyframes glowPulse {
      0%, 100% { filter: blur(2px) brightness(1.1); }
      50% { filter: blur(4px) brightness(1.4); }
    }

    @keyframes shineFlash {
      0% { opacity:1; box-shadow:0 0 3px #0f0; }
      50% { opacity:1; box-shadow:0 0 11px #0f0; }
      100% { opacity:0; box-shadow:0 0 0 transparent; }
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #0f0;
    }

    #upperBox {
      width: 50%;
      margin: 0 auto 20px auto;
      padding: 15px;
      background: url("stp.png");
      background-size: cover;
      background-position: center;
      border: 2px solid #0f0;
      box-shadow: 0 0 15px #0f0;
      text-align: center;
      font-size: 18px;
      text-shadow: 0 0 6px #0f0;
      animation: upperFloat 8s ease-in-out infinite alternate;
    }

    @keyframes upperFloat {
      0% { background-position: center; filter: brightness(1) blur(0px); }
      50% { background-position: center 20px; filter: brightness(1.3) blur(2px); }
      100% { background-position: center -20px; filter: brightness(1.1) blur(1px); }
    }

    #baseButton {
      padding: 8px 20px;
      background: black;
      color: #0f0;
      border: 1px solid #0f0;
      cursor: pointer;
      margin-bottom: 20px;
      transition: 0.2s;
    }

    #baseButton:hover {
      box-shadow: 0 0 12px #0f0;
    }

    .uRow span {
      display: inline-block;
      font-size: 22px;
      padding: 4px 6px;
      color: #0f0;
      text-shadow: 0 0 6px #0f0;
      transition: 0.2s;
    }

    .uRow span:hover {
      transform: scale(1.25);
      text-shadow: 0 0 12px #0f0;
    }

    svg {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>

  <svg width="0" height="0">
    <filter id="rpxDrip">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.25" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <button id="baseButton" onclick="goToBase()">.BASE.</button>

  <script>
    function goToBase() {
      window.location.href = "https://alienware51007-collab.github.io/AHOL/Oppeenn.html";
    }
  </script>

  <div id="upperBox">
    SYSTEM STATUS: ACTIVE
  </div>

  <!-- GALLERY DEMO GRID -->
  <div id="demo" style="position: fixed; top: 10px; right: 10px; display: grid; grid-template-columns: repeat(5, 100px); gap: 10px; z-index: 9999; padding: 10px; background: rgba(0, 0, 0, 0.7); border: 2px solid #0f0; box-shadow: 0 0 15px #0f0;">
  </div>

  <!-- NUMBER INPUT (no Enter, auto-trigger) -->
  <input id="numberInput" type="number" placeholder="Enter: 45, 4, 9, 16, or 25" style="position: fixed; bottom: 20px; right: 10px; width: 200px; padding: 8px; background: black; border: 1px solid #0f0; color: #0f0; z-index: 9998;">

  <script>
    const numbers = [45, 4, 9, 16, 25];
    const images = ["tiger.png", "image2.jpg", "image3.jpg", "image4.jpg", "image5.jpg"];

    function myDisplayer(some) {
      const demo = document.getElementById("demo");
      demo.innerHTML = '<img src="' + some + '" style="width:100px; height:100px; border:1px solid #0f0; object-fit:cover;">';
    }

    document.getElementById("numberInput").addEventListener("input", function(e) {
      const userNum = parseInt(e.target.value);
      const index = numbers.indexOf(userNum);

      if (!isNaN(userNum) && index !== -1) {
        myDisplayer(images[index]);
        e.target.value = "";
      }
    });
  </script>

  <h2>AHOL Chatbot</h2>

  <div id="uSpecialCenter" style="display:flex; gap:20px;">
    <div class="ribbon-col left-col" style="display:flex; flex-direction:column; gap:10px;">
      <div class="uRow"><span>x</span><span>難</span></div>
      <div class="uRow"><span>c</span><span>金</span></div>
      <div class="uRow"><span>7</span><span>魂</span></div>
      <div class="uRow"><span>q</span><span>龍</span></div>
    </div>

    <div class="ribbon-col center-col">
      <canvas id="seriesViz" width="260" height="260"></canvas>
    </div>

    <div class="ribbon-col right-col" style="display:flex; flex-direction:column; gap:10px;">
      <div class="uRow"><span>9</span><span>力</span></div>
      <div class="uRow"><span>t</span><span>火</span></div>
      <div class="uRow"><span>m</span><span>天</span></div>
      <div class="uRow"><span>z</span><span>神</span></div>
    </div>
  </div>

  <script>
    // ORIGINAL-STYLE RED/GREEN DOTS (static base)
    const sv = document.getElementById("seriesViz");
    const svctx = sv.getContext("2d");

    function drawSeriesDots() {
      svctx.clearRect(0, 0, sv.width, sv.height);

      // red dot
      svctx.fillStyle = "red";
      svctx.beginPath();
      svctx.arc(80, 80, 8, 0, Math.PI * 2);
      svctx.fill();

      // green dot
      svctx.fillStyle = "lime";
      svctx.beginPath();
      svctx.arc(180, 180, 8, 0, Math.PI * 2);
      svctx.fill();
    }

    drawSeriesDots();
  </script>

  <div id="chatOutput" style="border:1px solid #fff; padding:10px; min-height:150px; max-width:600px; margin-top:20px; margin-bottom:20px; position:relative; overflow:hidden;">
    <div id="shineBox" style="position:absolute; top:10px; right:10px; padding:4px 6px; background:black; border:1px solid #0f0; color:#0f0; font-family:monospace; font-size:8px; text-shadow:0 0 3px #0f0; z-index:10; cursor:pointer;">
      press 1 to shine CD...
    </div>
    <img id="vbnPhoto" src="vbn.png" alt="vbn photo" style="width:120px; filter:url(#rpxDrip); position:absolute; right:10px; bottom:10px;">
  </div>

  <script>
    // vbn photo load log
    document.getElementById("vbnPhoto").addEventListener("load", function() {
      console.log("vbn photo loaded inside chatbox");
    });

    // TAP-TO-SHINE CD (shineBox click)
    const shineBox = document.getElementById("shineBox");
    shineBox.addEventListener("click", function() {
      shineBox.style.animation = "shineFlash 0.8s ease-out";
      setTimeout(() => {
        shineBox.style.animation = "";
      }, 900);
    });

    // also allow key '1' to trigger shine
    document.addEventListener("keydown", function(e) {
      if (e.key === "1") {
        shineBox.click();
      }
    });
  </script>

  <input id="userInput" placeholder="Type to activate AHOL..." style="width:300px; padding:10px; border:1px solid #0f0; background:black; color:#0f0;">

  <div id="aiBox" style="margin-top:30px; padding:20px; border:1px solid #fff; width:340px; background:black;">
    <h3 style="text-shadow:0 0 10px #0f0;">AI Image Generator</h3>
    <input id="aiPrompt" placeholder="Type your prompt..." style="width:300px; padding:10px; border:1px solid #0f0; background:black; color:#0f0; margin-bottom:10px;">
    <canvas id="aiCanvas" width="300" height="300" style="border:1px solid #0f0; background:#111; margin-bottom:10px;"></canvas>
    <button id="generateImage" style="padding:10px 20px; background:#0f0; color:black; border:none; cursor:pointer;">GENERATE</button>
  </div>

  <script>
    const aiCanvas = document.getElementById("aiCanvas");
    const aiCtx = aiCanvas.getContext("2d");

    // BASE IMAGE jrxxyybeta
    const baseImg = new Image();
    baseImg.src = "jrxxyybeta.png";
    baseImg.onload = () => {
      aiCtx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
      aiCtx.drawImage(baseImg, 0, 0, aiCanvas.width, aiCanvas.height);
    };

    // ASDX COMMANDS WITH BLENDING MODES
    const blendModes = ["source-over", "screen", "lighten", "overlay", "difference", "color-dodge"];
    let blendIndex = 0;

    function setBlendMode() {
      aiCtx.globalCompositeOperation = blendModes[blendIndex];
      console.log("Blend mode:", blendModes[blendIndex]);
    }

    function asdxCommand(cmd) {
      switch(cmd) {
        case "a":
          replaceFaceRegion();
          break;
        case "s":
          replaceRightBoundary();
          break;
        case "d":
          // cycle blend mode
          blendIndex = (blendIndex + 1) % blendModes.length;
          setBlendMode();
          break;
        case "x":
          // clear overlays, restore base
          aiCtx.globalCompositeOperation = "source-over";
          aiCtx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
          aiCtx.drawImage(baseImg, 0, 0, aiCanvas.width, aiCanvas.height);
          break;
      }
    }

    function replaceFaceRegion() {
      const faceImg = new Image();
      faceImg.src = "vrshark.png";
      faceImg.onload = function() {
        aiCtx.drawImage(faceImg, 60, 0, 180, 120);
      };
    }

    function replaceRightBoundary() {
      const rightImg = new Image();
      rightImg.src = "rty.png";
      rightImg.onload = function() {
        aiCtx.drawImage(rightImg, aiCanvas.width - 80, 0, 80, aiCanvas.height);
      };
    }

    // keyboard bindings for ASDX
    document.addEventListener("keydown", function(e) {
      if (["a","s","d","x"].includes(e.key)) {
        asdxCommand(e.key);
      }
    });

    // GENERATE button (placeholder behavior)
    document.getElementById("generateImage").addEventListener("click", function() {
      const prompt = document.getElementById("aiPrompt").value;
      console.log("AI prompt:", prompt);
      // keep base + overlays; you can hook real generation here later
    });
  </script>

</body>
</html>
