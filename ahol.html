<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Convergent Circle System</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      text-align: center;
    }
    canvas {
      background: #111;
      border: 1px solid #444;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h2>Absolute Convergence on a Circle</h2>
  <p>White dots show partial sums; special glow near 4π and 3.44.</p>
  <canvas id="convCanvas" width="500" height="500"></canvas>

  <script>
    const canvas = document.getElementById("convCanvas");
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2;
    const cy = H / 2;

    const R1 = 4 * Math.PI;
    const R2 = 3.44;

    function complexTerm(k) {
      const mag = 1 / (k * k);
      const theta = 0.3 * k;
      return {
        re: mag * Math.cos(theta),
        im: mag * Math.sin(theta)
      };
    }

    function norm(z) {
      return Math.sqrt(z.re * z.re + z.im * z.im);
    }

    function add(z1, z2) {
      return { re: z1.re + z2.re, im: z1.im + z2.im };
    }

    function drawBaseCircle() {
      ctx.clearRect(0, 0, W, H);
      ctx.strokeStyle = "#333";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, 150, 0, 2 * Math.PI);
      ctx.stroke();
    }

    function drawDot(radius, angle, color = "#fff", size = 3) {
      const x = cx + radius * Math.cos(angle);
      const y = cy + radius * Math.sin(angle);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, 2 * Math.PI);
      ctx.fill();
    }

    let n = 1;
    let S = { re: 0, im: 0 };
    let angleBase = 0;

    function step() {
      const a_n = complexTerm(n);
      S = add(S, a_n);
      const r = norm(S);

      angleBase += 0.2;

      drawBaseCircle();

      drawDot(80, angleBase, "#fff", 3);

      const scaledR = Math.min(r * 10, 200);
      drawDot(scaledR, angleBase + 1.0, "#ccc", 4);

      const eps = 0.2;
      if (Math.abs(r - R1) < eps) {
        drawDot(150, angleBase + 2.0, "#0ff", 6);
      }
      if (Math.abs(r - R2) < eps) {
        drawDot(150, angleBase - 2.0, "#f0f", 6);
      }

      ctx.fillStyle = "#0f0";
      ctx.fillText("n = " + n, 10, 20);
      ctx.fillText("||S_n|| ≈ " + r.toFixed(4), 10, 40);

      n++;
      if (n < 500) {
        requestAnimationFrame(step);
      }
    }

    drawBaseCircle();
    step();
  </script>
</body>
</html>
