<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Chatbot + AI Image Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    #numberInput, #devLinkInput {
      position: fixed;
      bottom: 20px;
      right: 10px;
      width: 200px;
      padding: 8px;
      background: black;
      border: 1px solid #ccc;
      color: #ccc;
      z-index: 99999;
      font-family: monospace;
    }
    #devLinkInput { bottom: 60px; width: 280px; }

    #aiChatBox {
      position: relative;
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #fff;
      width: 260px;
      background: black;
    }

    #aiDescription {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 0, 0.9);
      color: black;
      font-size: 11px;
      padding: 2px 8px;
      border: 1px solid #0f0;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 0 10px #0f0;
    }

    #aiChatBox:hover #aiDescription {
      opacity: 1;
      top: -28px;
      animation: flashTag 1.2s infinite alternate;
    }

    @keyframes flashTag {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }

    /* Rest of your styles remain the same */
    body { background: url("jrxxyy.png"); background-size: cover; color: #fff; font-family: monospace; padding: 20px; position: relative; }
    /* ... (all your original styles for demo, upperBox, etc.) ... */
  </style>
</head>
<body>

  <input id="numberInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Enter: 45, 5, 9, 16, or 25">
  <input id="devLinkInput" type="text" placeholder="Dev: .cnx sublink here">

  <button id="baseButton" onclick="goToBase()"> .BASE. </button>
  <div id="upperBox">SYSTEM STATUS: ACTIVE</div>
  <div id="demo"></div>

  <h2 style="display:flex; align-items:center; gap:6px;">
    AHOL Chatbot
    <img src="ooo.png" style="width:22px; height:22px; image-rendering:crisp-edges;">
  </h2>

  <div id="uSpecialCenter" style="display:flex; gap:20px;">
    <!-- Your ribbon columns and seriesViz unchanged -->
  </div>

  <div id="chatOutput" style="border:1px solid #fff; padding:10px; min-height:150px; max-width:600px; margin-top:20px; margin-bottom:20px; position:relative; overflow:auto;">
    <div id="shineBox" style="position:absolute; top:10px; right:10px; padding:4px 6px; background:black; border:1px solid #ccc; color:#ccc; font-family:monospace; font-size:8px; text-shadow:0 0 3px #ccc; z-index:10; cursor:pointer;">
      press 1 to shine CD...
    </div>
  </div>

  <!-- AI ChatBox with hover tag -->
  <div id="aiChatBox">
    <div id="aiDescription">AI.cnx ROBOT</div>
    <h3 style="text-shadow:0 0 10px #ccc;">AI Chatbox <span style="font-size:12px; color:#0f0;">(DEV INT)</span></h3>
    <canvas id="aiCanvas" width="240" height="240" style="border:1px solid #ccc; background:#111; margin-bottom:10px;"></canvas>
  </div>

  <div style="margin-top:20px;">
    <input id="userInput" type="text" placeholder="{command}[payload]" 
           style="width:260px; padding:8px; background:black; color:#ccc; border:1px solid #ccc; font-family:monospace;">
  </div>

  <svg width="0" height="0">
    <filter id="rpxDrip">...</filter>
  </svg>

  <script>
    const ChatLink = {
      chars: ["難", "金", "魂", "龍", "力", "火", "天", "神"],
      markerMap: { x:"難", c:"金", 7:"魂", q:"龍", 9:"力", t:"火", m:"天", z:"神" },

      parse(msg) {
        const cmdMatch = msg.match(/\{([^}]+)\}/);
        const dataMatch = msg.match(/\[([^\]]+)\]/);
        return {
          command: cmdMatch ? cmdMatch[1].trim() : null,
          payload: dataMatch ? dataMatch[1].trim() : null
        };
      },

      // ... (all your previous methods: handleCharacterDrop, spawn, clear, etc.) ...

      currentSequence: null,
      sequenceInterval: null,

      // NEW: AI.cnxROBOT Web Image Search
      async handleAICNXRobot(query) {
        if (!query) return "No search term provided.";

        appendToChat("System", `Searching web for: ${query}...`);

        try {
          // Using Unsplash random source with keyword (public & no API key needed)
          const images = [];
          for (let i = 0; i < 8; i++) {  // Load 8 images
            images.push(`https://source.unsplash.com/random/240x240/?${encodeURIComponent(query)}&sig=${i}`);
          }

          this.currentSequence = {
            images: images,
            timing: 700,
            loop: true
          };

          appendToChat("System", `AI.cnxROBOT → Loaded ${images.length} images for "${query}"`);
          this.playSequence();
          return `AI.cnxROBOT sequence started for: ${query}`;
        } catch (e) {
          return "Failed to fetch images.";
        }
      },

      playSequence() {
        if (this.sequenceInterval) clearInterval(this.sequenceInterval);
        if (!this.currentSequence) return;

        const aiCtx = document.getElementById("aiCanvas").getContext("2d");
        let index = 0;

        this.sequenceInterval = setInterval(() => {
          const img = new Image();
          img.src = this.currentSequence.images[index];
          img.onload = () => {
            aiCtx.clearRect(0, 0, 240, 240);
            aiCtx.drawImage(img, 0, 0, 240, 240);
          };
          index = (index + 1) % this.currentSequence.images.length;
        }, this.currentSequence.timing);
      },

      async dispatch(command, payload) {
        if (payload && this.markerMap[payload]) return this.handleSpecificCharacter(this.markerMap[payload]);
        if (command === "clear" && payload === "demo") return this.handleClearDemo();
        if (command === "spawn") return this.handleSpawn(payload);
        if (command === "move" && payload === "left") return this.handleMoveLeft();
        if (command === "cnx") return await this.loadCNX(payload);
        
        // NEW COMMAND
        if (command === "AI.cnxROBOT") return await this.handleAICNXRobot(payload);

        if (command) return this.handleCharacterDrop();
        return "Invalid command. Use {command}[payload]";
      }
    };

    // Chat handling (unchanged)
    function appendToChat(role, msg) { /* ... same as before ... */ }

    document.getElementById("userInput").addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        const msg = e.target.value.trim();
        if (!msg) return;
        appendToChat("You", msg);
        const { command, payload } = ChatLink.parse(msg);
        const response = await ChatLink.dispatch(command, payload);
        appendToChat("System", response);
        e.target.value = "";
      }
    });

    // Dev input for .cnx (unchanged)
    document.getElementById("devLinkInput").addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        const url = e.target.value.trim();
        if (url) {
          const response = await ChatLink.loadCNX(url);
          appendToChat("Dev", response);
          e.target.value = "";
        }
      }
    });

    // Keep all your original keyboard shortcuts, canvas init, shine effect, etc.
    // ... (paste the rest of your previous script here: goToBase, shine, asdx keys, etc.) ...
  </script>
</body>
</html>
