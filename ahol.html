<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      padding: 20px;
    }

    #chatOutput {
      border: 1px solid #fff;
      padding: 10px;
      min-height: 150px;
      max-width: 600px;
    }

    #userInput {
      margin-top: 20px;
      padding: 10px;
      width: 300px;
      background: #222;
      color: #0f0;
      border: 1px solid #0f0;
    }

    /* FIXED BUTTON POSITION */
    #baseButton {
      position: absolute;
      left: 20px;
      top: 20px;
      background: #000;
      color: #fff;
      border: 1px solid #fff;
      padding: 10px 20px;
      font-family: monospace;
      cursor: pointer;
    }

    #baseButton:hover {
      background: #fff;
      color: #000;
    }
  </style>
</head>

<body>

  <!-- FIXED BUTTON LOCATION -->
 

  <h2>AHOL Chatbot</h2>
  <button id="baseButton" onclick="goToBase()">.BASE.</button>

  <div id="chatOutput"></div>

  <input id="userInput" placeholder="Type to activate AHOL...">

  <script>
    // ---------------------------
    // Navigation Button
    // ---------------------------
    function goToBase() {
      window.location.href =
        "https://htmlpreview.github.io/?https://github.com/alienware51007-collab/AHOL/blob/main/globe.html";
    }

    // ---------------------------
    // Engine
    // ---------------------------
    const ChatBot = {
      speakQueue: [],
      active: false,

      loadScript(lines) {
        this.speakQueue.push(...lines);
        if (!this.active) this.run();
      },

      run() {
        this.active = true;

        if (this.speakQueue.length === 0) {
          this.active = false;
          return;
        }

        const line = this.speakQueue.shift();
        this.output(line);

        setTimeout(() => this.run(), 1200);
      },

      output(text) {
        const box = document.getElementById("chatOutput");
        if (box) {
          const p = document.createElement("p");
          p.textContent = text;
          box.appendChild(p);
        }
      }
    };

    // ---------------------------
    // ChatScript
    // ---------------------------
    const ChatScript = [
      "AHOL system initializing...",
      "Boot sequence complete.",
      "DreamTech interface online.",
      "Monitoring environment...",
      "Standing by for next directive."
    ];

    // ---------------------------
    // Activation Control
    // ---------------------------
    let chatbotEnabled = false;

    function activateChatBot() {
      if (!chatbotEnabled) {
        chatbotEnabled = true;
        ChatBot.loadScript(ChatScript);
      }
    }

    // ---------------------------
    // User Input Activation
    // ---------------------------
    const inputBox = document.getElementById("userInput");

    inputBox.addEventListener("input", () => {
      activateChatBot();
    });
  </script>

</body>
</html>
