<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Chatbot + AI Image Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: url("jrxxyy.png") center center / cover no-repeat fixed;
      color: #fff;
      font-family: monospace;
      padding: 20px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(200,200,200,0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,200,200,0.10) 1px, transparent 1px),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 14px);
      background-size: 60px 60px, 60px 60px, 140px 140px;
      filter: blur(2px) brightness(1.1);
      animation: zoomPattern 16s ease-in-out infinite alternate, glowPulse 6s ease-in-out infinite;
    }

    @keyframes zoomPattern { 0% { transform: scale(1); } 100% { transform: scale(1.16); } }
    @keyframes glowPulse { 0%,100% { filter: blur(2px) brightness(1.1); } 50% { filter: blur(4px) brightness(1.4); } }

    #numberInput {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 200px;
      padding: 10px;
      background: black;
      border: 1px solid #ccc;
      color: #ccc;
      z-index: 99999;
      font-family: monospace;
    }

    #upperBox {
      width: 50%;
      max-width: 600px;
      margin: 0 auto 20px;
      padding: 15px;
      background: url("stp.png") center/cover;
      border: 2px solid #ccc;
      box-shadow: 0 0 15px #ccc;
      text-align: center;
      font-size: 18px;
      text-shadow: 0 0 6px #ccc;
      animation: upperFloat 8s ease-in-out infinite alternate;
    }

    @keyframes upperFloat {
      0%   { background-position: center; filter: brightness(1); }
      100% { background-position: center 30px; filter: brightness(1.3); }
    }

    #baseButton {
      padding: 10px 24px;
      background: black;
      color: #ccc;
      border: 1px solid #ccc;
      cursor: pointer;
      transition: 0.2s;
    }
    #baseButton:hover { box-shadow: 0 0 12px #ccc; }

    .uRow span {
      display: inline-block;
      font-size: 22px;
      padding: 4px 8px;
      color: #ccc;
      text-shadow: 0 0 6px #ccc;
      transition: 0.2s;
    }
    .uRow span:hover {
      transform: scale(1.25);
      text-shadow: 0 0 12px #ccc;
    }

    #demo {
      position: fixed;
      top: 10px;
      right: 10px;
      display: grid;
      grid-template-columns: repeat(5, 100px);
      gap: 10px;
      z-index: 9999;
      padding: 10px;
      background: rgba(0, 0, 0, 0.75);
      border: 2px solid #ccc;
      box-shadow: 0 0 15px #ccc;
    }

    #chatOutput {
      border: 1px solid #fff;
      padding: 15px;
      min-height: 160px;
      max-width: 600px;
      margin: 20px 0;
      position: relative;
      overflow-y: auto;
      background: rgba(0,0,0,0.6);
    }

    #shineBox {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 8px;
      background: black;
      border: 1px solid #ccc;
      color: #ccc;
      font-size: 9px;
      cursor: pointer;
    }

    #aiChatBox {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #fff;
      width: 280px;
      background: black;
    }

    canvas {
      border: 1px solid #ccc;
      background: #111;
    }

    /* Transparent middle box */
    #seriesViz {
      background: transparent !important;
      border: 2px solid #ccc;
      box-shadow: 0 0 15px rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

  <input id="numberInput" type="text" inputmode="numeric" placeholder="Enter: 45, 5, 9, 16, or 25">

  <button id="baseButton">.BASE.</button>

  <div id="upperBox">SYSTEM STATUS: ACTIVE</div>

  <div id="demo"></div>

  <h2 style="display:flex; align-items:center; gap:6px;">
    AHOL Chatbot <img src="ooo.png" style="width:22px; height:22px; image-rendering:crisp-edges;">
  </h2>

  <div id="uSpecialCenter" style="display:flex; gap:30px; justify-content:center; flex-wrap:wrap; margin: 30px 0;">
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div class="uRow"><span>x</span><span>難</span></div>
      <div class="uRow"><span>c</span><span>金</span></div>
      <div class="uRow"><span>7</span><span>魂</span></div>
      <div class="uRow"><span>q</span><span>龍</span></div>
    </div>

    <div>
      <canvas id="seriesViz" width="260" height="260"></canvas>
    </div>

    <div style="display:flex; flex-direction:column; gap:10px;">
      <div class="uRow"><span>9</span><span>力</span></div>
      <div class="uRow"><span>t</span><span>火</span></div>
      <div class="uRow"><span>m</span><span>天</span></div>
      <div class="uRow"><span>z</span><span>神</span></div>
    </div>
  </div>

  <div id="chatOutput">
    <div id="shineBox">press 1 to shine CD...</div>
    <img id="vbnPhoto" src="vbn.png" style="width:120px; filter:url(#rpxDrip); position:absolute; right:15px; bottom:15px;">
  </div>

  <div id="aiChatBox">
    <h3 style="text-shadow:0 0 10px #ccc;">AI Chatbox</h3>
    <canvas id="aiCanvas" width="240" height="240"></canvas>
  </div>

  <div style="margin-top:20px;">
    <input id="userInput" type="text" placeholder="{command}[payload]" 
           style="width:280px; padding:10px; background:black; color:#ccc; border:1px solid #ccc;">
  </div>

  <svg width="0" height="0">
    <filter id="rpxDrip">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.25" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <script>
    // ==================== NUMBER INPUT ====================
    const numbers = [45, 5, 9, 16, 25];
    const images = ["tig.png", "image2.jpg", "image3.jpg", "image4.jpg", "image5.jpg"];

    document.getElementById("numberInput").addEventListener("input", function(e) {
      const val = parseInt(e.target.value);
      const index = numbers.indexOf(val);
      if (!isNaN(val) && index !== -1) {
        document.getElementById("demo").innerHTML = 
          `<img src="${images[index]}" style="width:100px; height:100px; border:1px solid #ccc; object-fit:cover;">`;
        e.target.value = "";
      }
    });

    // ==================== BASE BUTTON ====================
    document.getElementById("baseButton").addEventListener("click", () => {
      window.location.href = "https://alienware51007-collab.github.io/AHOL/Oppeenn.html";
    });

    // ==================== SERIES VIZ (Middle Box) ====================
    const sv = document.getElementById("seriesViz");
    const svctx = sv.getContext("2d");

    function drawSeriesDots() {
      svctx.clearRect(0, 0, sv.width, sv.height);

      // Red Dot
      svctx.fillStyle = "red";
      svctx.shadowColor = "red";
      svctx.shadowBlur = 20;
      svctx.beginPath();
      svctx.arc(80, 80, 9, 0, Math.PI * 2);
      svctx.fill();

      // Lime Green Dot
      svctx.fillStyle = "lime";
      svctx.shadowColor = "lime";
      svctx.shadowBlur = 20;
      svctx.beginPath();
      svctx.arc(180, 180, 9, 0, Math.PI * 2);
      svctx.fill();
    }

    drawSeriesDots();

    // ==================== AI CANVAS & KEYBOARD CONTROLS ====================
    const aiCanvas = document.getElementById("aiCanvas");
    const aiCtx = aiCanvas.getContext("2d");
    let blendIndex = 0;
    const blendModes = ["source-over", "screen", "lighten", "overlay", "difference", "color-dodge"];

    const betaImg = new Image();
    betaImg.src = "jrxxyybeta.png";
    betaImg.onload = () => aiCtx.drawImage(betaImg, 0, 0, aiCanvas.width, aiCanvas.height);

    function asdxCommand(key) {
      switch(key) {
        case "a":
          const shark = new Image();
          shark.src = "vrshark.png";
          shark.onload = () => aiCtx.drawImage(shark, 60, 0, 180, 120);
          break;
        case "s":
          const side = new Image();
          side.src = "rty.png";
          side.onload = () => aiCtx.drawImage(side, aiCanvas.width - 80, 0, 80, aiCanvas.height);
          break;
        case "d":
          blendIndex = (blendIndex + 1) % blendModes.length;
          aiCtx.globalCompositeOperation = blendModes[blendIndex];
          break;
        case "x":
          aiCtx.globalCompositeOperation = "source-over";
          aiCtx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
          aiCtx.drawImage(betaImg, 0, 0, aiCanvas.width, aiCanvas.height);
          break;
      }
    }

    document.addEventListener("keydown", e => {
      if (["a","s","d","x"].includes(e.key)) asdxCommand(e.key);
      if (e.key === "1") document.getElementById("shineBox").click();
    });

    // Shine Box
    document.getElementById("shineBox").addEventListener("click", function() {
      this.style.animation = "shineFlash 0.8s ease-out";
      setTimeout(() => this.style.animation = "", 900);
    });

    // ==================== CHAT & COMMAND SYSTEM ====================
    const ChatLink = {
      chars: ["難", "金", "魂", "龍", "力", "火", "天", "神"],

      parse(msg) {
        const cmdMatch = msg.match(/\{([^}]+)\}/);
        const dataMatch = msg.match(/\[([^\]]+)\]/);
        return {
          command: cmdMatch ? cmdMatch[1].trim() : null,
          payload: dataMatch ? dataMatch[1].trim() : null
        };
      },

      async handleCharacterDrop() {
        const demo = document.getElementById("demo");
        const chosen = this.chars[Math.floor(Math.random() * this.chars.length)];
        const span = document.createElement("span");
        span.textContent = chosen;
        span.style.fontSize = "32px";
        span.style.color = "#ccc";
        span.style.textShadow = "0 0 6px #ccc";
        span.style.border = "1px solid #ccc";
        span.style.display = "flex";
        span.style.alignItems = "center";
        span.style.justifyContent = "center";
        span.style.width = "100px";
        span.style.height = "100px";
        demo.appendChild(span);
        return `Placed '${chosen}'`;
      },

      async handleClearDemo() {
        document.getElementById("demo").innerHTML = "";
        return "Demo grid cleared.";
      },

      async handleSpawn(count) {
        count = parseInt(count);
        if (isNaN(count) || count < 1) return "Invalid count.";
        for (let i = 0; i < count; i++) await this.handleCharacterDrop();
        return `Spawned ${count} characters.`;
      },

      async handleMoveLeft() {
        const demo = document.getElementById("demo");
        const items = Array.from(demo.children);
        if (items.length < 2) return "Not enough items.";
        demo.appendChild(items.shift());
        return "Moved left.";
      },

      async dispatch(command, payload) {
        if (command === "clear" && payload === "demo") return this.handleClearDemo();
        if (command === "spawn") return this.handleSpawn(payload);
        if (command === "move" && payload === "left") return this.handleMoveLeft();
        return this.handleCharacterDrop();
      }
    };

    function appendToChat(role, msg) {
      const chat = document.getElementById("chatOutput");
      const div = document.createElement("div");
      div.innerHTML = `<b>${role}:</b> ${msg}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById("userInput").addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        const msg = e.target.value.trim();
        if (!msg) return;

        appendToChat("You", msg);
        const { command, payload } = ChatLink.parse(msg);
        const response = await ChatLink.dispatch(command, payload);
        appendToChat("System", response);

        e.target.value = "";
      }
    });
  </script>
</body>
</html>
