<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Chatbot + AI Image Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    * { box-sizing: border-box; }
    
    body {
      background: url("jrxxyy.png") center center / cover no-repeat fixed;
      color: #fff;
      font-family: monospace;
      padding: 15px;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;          /* Helps center content too */
    }

    /* Solid AI ChatBox */
    #aiChatBox {
      position: relative;
      margin: 25px auto;
      padding: 20px;
      width: 100%;
      max-width: 280px;
      background: black;
      border: 1px solid #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    #aiDescription {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 0, 0.9);
      color: black;
      font-size: 11px;
      padding: 2px 10px;
      border: 1px solid #0f0;
      white-space: nowrap;
      border-radius: 12px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 0 12px #0f0;
    }

    #aiChatBox:hover #aiDescription {
      opacity: 1;
      top: -26px;
      animation: flashTag 1.2s infinite alternate;
    }

    @keyframes flashTag { from { opacity: 0.7; } to { opacity: 1; } }

    #aiCanvas {
      border: 1px solid rgba(255,255,255,0.3);
      background: #111;
      border-radius: 8px;
      width: 100%;
      max-width: 240px;
      height: auto;
      aspect-ratio: 1 / 1;
    }

    /* Inputs */
    #numberInput, #devLinkInput, #userInput {
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid #666;
      color: #ccc;
      padding: 10px;
      font-family: monospace;
      border-radius: 6px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 10px;
    }

    #devLinkInput { margin-top: 10px; }

    button {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid #fff;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    #chatOutput {
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.6);
      padding: 12px;
      min-height: 160px;
      max-height: 45vh;
      overflow-y: auto;
      border-radius: 12px;
      margin: 15px 0;
      width: 100%;
      max-width: 600px;
    }

    /* Mobile Optimizations */
    @media (max-width: 480px) {
      body { padding: 10px; }
      #aiChatBox { max-width: 100%; margin: 20px auto; }
      #chatOutput { max-height: 40vh; }
    }

    #chatOutput::-webkit-scrollbar { width: 6px; }
    #chatOutput::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
    }

    /* AI Chat controls and modal */
    .ai-controls { display:flex; gap:8px; margin-top:10px; justify-content:center; }
    .ai-controls button { padding:6px 10px; font-size:13px; }

    #imageModal {
      position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.8); z-index:9999;
    }
    #imageModal img { max-width:95%; max-height:95%; border:4px solid rgba(255,255,255,0.06); box-shadow:0 10px 40px rgba(0,0,0,0.8); border-radius:8px; }
    #imageModal .closeBtn { position:absolute; top:18px; right:18px; background:rgba(255,255,255,0.05); border:1px solid #fff; color:#fff; padding:6px 8px; cursor:pointer; border-radius:6px; }
  </style>
</head>
<body>

  <input id="numberInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="Enter: 45, 5, 9, 16, or 25">
  <input id="devLinkInput" type="text" placeholder="Dev: .cnx sublink here">

  <button id="baseButton" onclick="goToBase()"> .BASE. </button>

  <div id="upperBox">SYSTEM STATUS: ACTIVE</div>
  <div id="demo"></div>

  <h2 style="display:flex; align-items:center; gap:6px; margin:15px 0;">
    AHOL Chatbot <img src="ooo.png" style="width:22px; height:22px; image-rendering:crisp-edges;">
  </h2>

  <div id="chatOutput">
    <div id="shineBox" style="position:absolute; top:12px; right:12px; padding:4px 8px; background:rgba(0,0,0,0.7); border:1px solid #ccc; font-size:9px; cursor:pointer;">
      press 1 to shine CD...
    </div>
  </div>

  <div id="aiChatBox">
    <div id="aiDescription">AI.cnx ROBOT</div>
    <h3 style="text-shadow:0 0 10px #ccc; margin-bottom:10px;">AI Chatbox <span style="font-size:12px; color:#0f0;">(DEV INT)</span></h3>
    <canvas id="aiCanvas" width="240" height="240"></canvas>

    <div class="ai-controls">
      <button type="button" onclick="ChatLink.viewImage()">View</button>
      <button type="button" onclick="ChatLink.restoreImage()">Restore</button>
      <button type="button" onclick="ChatLink.showShark()">Shark</button>
      <button type="button" onclick="ChatLink.stopSequence()">Stop</button>
    </div>
  </div>

  <!-- Modal for viewing canvas image -->
  <div id="imageModal" onclick="document.getElementById('imageModal').style.display='none'">
    <button class="closeBtn" onclick="document.getElementById('imageModal').style.display='none'; event.stopPropagation();">Close</button>
    <img id="modalImg" src="" alt="Canvas view">
  </div>

  <div>
    <input id="userInput" type="text" placeholder="{command}[payload]" 
           style="width:100%; max-width:320px;">
  </div>

  <script>
    const ChatLink = {
      chars: ["難", "金", "魂", "龍", "力", "火", "天", "神"],
      markerMap: { x:"難", c:"金", 7:"魂", q:"龍", 9:"力", t:"火", m:"天", z:"神" },

      parse(msg) {
        const cmdMatch = msg.match(/\{([^}]+)\}/);
        const dataMatch = msg.match(/\[([^\]]+)\]/);
        return {
          command: cmdMatch ? cmdMatch[1].trim() : null,
          payload: dataMatch ? dataMatch[1].trim() : null
        };
      },

      createDemoSpan(text) {
        const span = document.createElement("span");
        span.textContent = text;
        span.style.fontSize = "38px";
        span.style.color = "#ccc";
        span.style.textShadow = "0 0 10px #ccc";
        span.style.border = "1px solid #ccc";
        span.style.background = "rgba(20,20,20,0.6)";
        span.style.display = "inline-flex";
        span.style.alignItems = "center";
        span.style.justifyContent = "center";
        span.style.width = "100px";
        span.style.height = "100px";
        span.style.margin = "4px";
        return span;
      },

      async handleSpecificCharacter(ch) {
        document.getElementById("demo").appendChild(this.createDemoSpan(ch));
        return `Placed '${ch}'`;
      },

      async handleCharacterDrop() {
        const chosen = this.chars[Math.floor(Math.random() * this.chars.length)];
        document.getElementById("demo").appendChild(this.createDemoSpan(chosen));
        return `Placed '${chosen}'`;
      },

      async handleClearDemo() {
        document.getElementById("demo").innerHTML = "";
        return "Demo grid cleared.";
      },

      async handleSpawn(count) {
        count = parseInt(count);
        if (isNaN(count) || count < 1) return "Invalid count.";
        for (let i = 0; i < count; i++) await this.handleCharacterDrop();
        return `Spawned ${count} characters.`;
      },

      async handleMoveLeft() {
        const demo = document.getElementById("demo");
        const items = Array.from(demo.children);
        if (items.length < 2) return "Not enough items.";
        demo.appendChild(items.shift());
        return "Moved left.";
      },

      currentSequence: null,
      sequenceInterval: null,

      async handleAICNXRobot(query) {
        if (!query) return "No search term provided.";
        appendToChat("System", `Searching for: ${query}...`);

        try {
          const images = [];
          for (let i = 0; i < 8; i++) {
            images.push(`https://source.unsplash.com/random/240x240/?${encodeURIComponent(query)}&sig=${i}`);
          }
          this.currentSequence = { images, timing: 700, loop: true };
          appendToChat("System", `AI.cnxROBOT → Loaded ${images.length} images`);
          this.playSequence();
          return `Sequence started for "${query}"`;
        } catch (e) {
          return "Failed to load images.";
        }
      },

      playSequence() {
        if (this.sequenceInterval) clearInterval(this.sequenceInterval);
        const aiCanvas = document.getElementById("aiCanvas");
        const aiCtx = aiCanvas.getContext("2d");
        let index = 0;

        // Reset saved markers for this sequence run
        try { this.savedImage = this.savedImage || aiCanvas.toDataURL(); } catch (e) { /* ignore cross-origin */ }

        this.sequenceInterval = setInterval(() => {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.src = this.currentSequence.images[index];
          img.onload = () => {
            try { this.lastSaved = aiCanvas.toDataURL(); } catch (e) { /* ignore */ }
            aiCtx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
            aiCtx.drawImage(img, 0, 0, aiCanvas.width, aiCanvas.height);
          };
          index = (index + 1) % this.currentSequence.images.length;
        }, this.currentSequence.timing);
      },

      stopSequence() {
        if (this.sequenceInterval) {
          clearInterval(this.sequenceInterval);
          this.sequenceInterval = null;
          appendToChat("System", "Sequence stopped.");
        }
      },

      restoreImage() {
        const aiCanvas = document.getElementById("aiCanvas");
        const aiCtx = aiCanvas.getContext("2d");
        const data = this.lastSaved || this.savedImage;
        if (!data) {
          appendToChat("System", "No saved image to restore.");
          return "No saved image.";
        }
        const img = new Image();
        img.src = data;
        img.onload = () => {
          aiCtx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
          aiCtx.drawImage(img, 0, 0, aiCanvas.width, aiCanvas.height);
        };
        return "Restored image.";
      },

      viewImage() {
        const aiCanvas = document.getElementById("aiCanvas");
        const data = aiCanvas.toDataURL();
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImg");
        if (!modal || !modalImg) return "Modal not available.";
        modalImg.src = data;
        modal.style.display = "flex";
        return "Opened view.";
      },

      showShark(query) {
        const q = query || "shark";
        this.stopSequence();
        const aiCanvas = document.getElementById("aiCanvas");
        const aiCtx = aiCanvas.getContext("2d");
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = `https://source.unsplash.com/random/240x240/?${encodeURIComponent(q)}`;
        img.onload = () => {
          try { this.lastSaved = aiCanvas.toDataURL(); } catch (e) { /* ignore */ }
          aiCtx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
          aiCtx.drawImage(img, 0, 0, aiCanvas.width, aiCanvas.height);
          appendToChat("System", "Shark image loaded.");
        };
        return "Shark shown.";
      },


      async dispatch(command, payload) {
        if (payload && this.markerMap[payload]) return this.handleSpecificCharacter(this.markerMap[payload]);
        if (command === "clear" && payload === "demo") return this.handleClearDemo();
        if (command === "spawn") return this.handleSpawn(payload);
        if (command === "move" && payload === "left") return this.handleMoveLeft();
        if (command === "AI.cnxROBOT") return await this.handleAICNXRobot(payload);
        if (command === "shark") return this.showShark(payload);

        if (command) return this.handleCharacterDrop();
        return "Invalid command. Use {command}[payload]";
      }
    };

    function appendToChat(role, msg) {
      const chat = document.getElementById("chatOutput");
      const div = document.createElement("div");
      div.innerHTML = `<b>${role}:</b> ${msg}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById("userInput").addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        const msg = e.target.value.trim();
        if (!msg) return;
        appendToChat("You", msg);
        const { command, payload } = ChatLink.parse(msg);
        const response = await ChatLink.dispatch(command, payload);
        appendToChat("System", response);
        e.target.value = "";
      }
    });

    document.getElementById("devLinkInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const url = e.target.value.trim();
        if (url) {
          appendToChat("Dev", "Loading .cnx...");
          e.target.value = "";
        }
      }
    });

    function goToBase() {
      window.location.href = "https://alienware51007-collab.github.io/AHOL/Oppeenn.html";
    }

    window.addEventListener('load', () => {
      document.getElementById("userInput").focus();
    });
  </script>
</body>
</html>
