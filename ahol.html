<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DreamTech Globe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      background: #000;
    }
  </style>
</head>

<body>

  <canvas id="globeCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById("globeCanvas");
    const ctx = canvas.getContext("2d");

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const r = 150;

    let tick = 0;

    // ---------------------------
    // 007 POINT SYSTEM
    // ---------------------------
    const points007 = [
      { x: 42,  y: 88  },
      { x: 120, y: 140 },
      { x: 200, y: 60  },
      { x: 310, y: 180 },
      { x: 260, y: 300 },
      { x: 150, y: 250 },
      { x: 80,  y: 200 },
      { x: 330, y: 330 },
      { x: 50,  y: 310 },
      { x: 210, y: 210 }
    ];

    function draw007Points() {
      points007.forEach(pt => {
        ctx.fillStyle = "black";
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    // ---------------------------
    // Globe Drawing
    // ---------------------------
    function drawGlobe() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const pulse = Math.sin(tick / 10) * 4;

      // red sphere
      ctx.fillStyle = "red";
      ctx.beginPath();
      ctx.arc(cx + pulse, cy + pulse, r, 0, Math.PI * 2);
      ctx.fill();

      // white globe-like lines
      ctx.strokeStyle = "white";
      ctx.lineWidth = 1;

      for (let i = -3; i <= 3; i++) {
        const offset = (i / 3) * r * 0.8;
        ctx.beginPath();
        ctx.ellipse(cx + offset + pulse, cy + pulse, r * 0.9, r, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      for (let j = -3; j <= 3; j++) {
        const offset = (j / 3) * r * 0.8;
        ctx.beginPath();
        ctx.ellipse(cx + pulse, cy + offset + pulse, r, r * 0.9, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      // ⭐ Draw 007 points every frame
      draw007Points();

      tick++;
    }

    // ---------------------------
    // Hover Detection
    // ---------------------------
    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      drawGlobe();

      points007.forEach(pt => {
        const dx = mx - pt.x;
        const dy = my - pt.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 8) {
          ctx.fillStyle = "white";
          ctx.font = "14px monospace";
          ctx.fillText(`(${pt.x}, ${pt.y})`, pt.x + 10, pt.y - 10);
        }
      });
    });

    // ---------------------------
    // Animation Loop
    // ---------------------------
    setInterval(drawGlobe, 400);

    drawGlobe();
  </script>

</body>
</html>
