<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Chatbot + AI Image Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: url("jrxxyy.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #fff;
      font-family: monospace;
      padding: 20px;
      position: relative;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #0f0;
    }

    #baseButton {
      padding: 8px 20px;
      background: black;
      color: #0f0;
      border: 1px solid #0f0;
      cursor: pointer;
      margin-bottom: 20px;
      transition: 0.2s;
    }
    #baseButton:hover {
      box-shadow: 0 0 12px #0f0;
    }

    .uRow span {
      display: inline-block;
      font-size: 22px;
      padding: 4px 6px;
      color: #0f0;
      text-shadow: 0 0 6px #0f0;
      transition: 0.2s;
    }
    .uRow span:hover {
      transform: scale(1.25);
      text-shadow: 0 0 12px #0f0;
    }

    svg {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>

  <svg width="0" height="0">
    <filter id="rpxDrip">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.25" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <button id="baseButton" onclick="goToBase()">.BASE.</button>

  <script>
    function goToBase() {
      window.location.href = "https://alienware51007-collab.github.io/AHOL/Oppeenn.html";
    }
  </script>

  <h2>AHOL Chatbot</h2>

  <div id="uSpecialCenter" style="display:flex; gap:20px;">

    <div class="ribbon-col left-col" style="display:flex; flex-direction:column; gap:10px;">
      <div class="uRow"><span>x</span><span>難</span></div>
      <div class="uRow"><span>c</span><span>金</span></div>
      <div class="uRow"><span>7</span><span>魂</span></div>
      <div class="uRow"><span>q</span><span>龍</span></div>
    </div>

    <div class="ribbon-col center-col">
      <canvas id="seriesViz" width="260" height="260"></canvas>
    </div>

    <div class="ribbon-col right-col" style="display:flex; flex-direction:column; gap:10px;">
      <div class="uRow"><span>9</span><span>力</span></div>
      <div class="uRow"><span>t</span><span>火</span></div>
      <div class="uRow"><span>m</span><span>天</span></div>
      <div class="uRow"><span>z</span><span>神</span></div>
    </div>

  </div> <!-- closes uSpecialCenter -->

  <div id="chatOutput" style="
      border:1px solid #fff;
      padding:10px;
      min-height:150px;
      max-width:600px;
      margin-top:20px;
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
  ">
    <img id="vbnPhoto" src="vbn.png" alt="vbn photo" style="
      width:120px;
      filter:url(#rpxDrip);
      position:absolute;
      right:10px;
      bottom:10px;
    ">
  </div>

  <script>
    document.getElementById("vbnPhoto").addEventListener("load", () => {
      console.log("vbn photo loaded inside chatbox");
    });
  </script>

  <input id="userInput" placeholder="Type to activate AHOL..." style="
    width:300px;
    padding:10px;
    border:1px solid #0f0;
    background:black;
    color:#0f0;
  ">

  <div id="aiBox" style="
      margin-top:30px;
      padding:20px;
      border:1px solid #fff;
      width:340px;
      background:black;
  ">
    <h3 style="text-shadow:0 0 10px #0f0;">AI Image Generator</h3>

    <input id="aiPrompt" placeholder="Type your prompt..." style="
      width:300px;
      padding:10px;
      border:1px solid #0f0;
      background:black;
      color:#0f0;
      margin-bottom:10px;
    ">

    <canvas id="aiCanvas" width="300" height="300" style="
      border:1px solid #0f0;
      background:#111;
      margin-bottom:10px;
    "></canvas>

    <button id="generateImage" style="
      padding:10px 20px;
      background:#0f0;
      color:black;
      border:none;
      cursor:pointer;
    ">GENERATE</button>
  </div>

  <!-- ⭐ ASDX ENGINE EMBEDDED DIRECTLY -->
  <script>
    function asdxCommand(cmd) {
      switch(cmd) {

        case "a":
          replaceFaceRegion();
          break;

        case "s":
          console.log("S pressed");
          break;

        case "d":
          console.log("D pressed");
          break;

        case "x":
          console.log("X pressed");
          break;

        default:
          console.log("Unknown command:", cmd);
      }
    }

    function replaceFaceRegion() {
      const canvas = document.getElementById("aiCanvas");
      const ctx = canvas.getContext("2d");

      const faceImg = new Image();
      faceImg.src = "vrshark.png";

      faceImg.onload = () => {
        const faceX = 60;
        const faceY = 0;
        const faceWidth = 180;
        const faceHeight = 120;

        ctx.drawImage(faceImg, faceX, faceY, faceWidth, faceHeight);
      };
    }
  </script>
  <script>
  function asdxCommand(cmd) {
    switch(cmd) {

      case "a":
        replaceFaceRegion();
        break;

      case "s":
        replaceRightBoundary();
        break;

      case "d":
        console.log("D pressed");
        break;

      case "x":
        console.log("X pressed");
        break;

      default:
        console.log("Unknown command:", cmd);
    }
  }

  // A — Replace face region
  function replaceFaceRegion() {
    const canvas = document.getElementById("aiCanvas");
    const ctx = canvas.getContext("2d");

    const faceImg = new Image();
    faceImg.src = "vrshark.png";

    faceImg.onload = () => {
      const faceX = 60;
      const faceY = 0;
      const faceWidth = 180;
      const faceHeight = 120;

      ctx.drawImage(faceImg, faceX, faceY, faceWidth, faceHeight);
    };
  }

  // S — Replace RIGHT vertical boundary region with rty.png
  function replaceRightBoundary() {
    const canvas = document.getElementById("aiCanvas");
    const ctx = canvas.getContext("2d");

    const rightImg = new Image();
    rightImg.src = "rty.png";  // ⭐ your new vertical image

    rightImg.onload = () => {
      // ⭐ RIGHT VERTICAL BOUNDARY REGION
      const regionWidth = 80;                 // vertical strip width
      const regionX = canvas.width - regionWidth; // rightmost 80px
      const regionY = 0;
      const regionHeight = canvas.height;     // full vertical height

      // ⭐ Draw rty.png stretched vertically
      ctx.drawImage(rightImg, regionX, regionY, regionWidth, regionHeight);
    };
  }
  </script>
