<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Chatbot + AI Image Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: url("jrxxyy.png") center center / cover no-repeat fixed;
      color: #fff;
      font-family: monospace;
      padding: 20px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      z-index: -1;
      pointer-events: none;
      background-image: linear-gradient(rgba(200,200,200,0.10) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(200,200,200,0.10) 1px, transparent 1px),
                        repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 14px);
      background-size: 60px 60px, 60px 60px, 140px 140px;
      filter: blur(2px) brightness(1.1);
      animation: zoomPattern 16s ease-in-out infinite alternate, glowPulse 6s ease-in-out infinite;
    }

    @keyframes zoomPattern { 0% { transform: scale(1); } 100% { transform: scale(1.16); } }
    @keyframes glowPulse { 0%,100% { filter: blur(2px) brightness(1.1); } 50% { filter: blur(4px) brightness(1.4); } }

    #numberInput { 
      position: fixed; bottom: 20px; right: 20px; width: 200px; padding: 10px; 
      background: black; border: 1px solid #ccc; color: #ccc; z-index: 99999; font-family: monospace; 
    }

    #upperBox { 
      width: 50%; max-width: 600px; margin: 0 auto 20px; padding: 15px; 
      background: url("stp.png") center/cover; border: 2px solid #ccc; box-shadow: 0 0 15px #ccc; 
      text-align: center; font-size: 18px; text-shadow: 0 0 6px #ccc; 
      animation: upperFloat 8s ease-in-out infinite alternate; 
    }

    @keyframes upperFloat { 
      0% { background-position: center; filter: brightness(1); } 
      100% { background-position: center 30px; filter: brightness(1.3); } 
    }

    #baseButton { 
      padding: 10px 24px; background: black; color: #ccc; border: 1px solid #ccc; 
      cursor: pointer; transition: 0.2s; 
    }
    #baseButton:hover { box-shadow: 0 0 12px #ccc; }

    .uRow span { 
      display: inline-block; font-size: 22px; padding: 4px 8px; color: #ccc; 
      text-shadow: 0 0 6px #ccc; transition: 0.2s; 
    }
    .uRow span:hover { transform: scale(1.25); text-shadow: 0 0 12px #ccc; }

    #demo { 
      position: fixed; top: 10px; right: 10px; display: grid; grid-template-columns: repeat(5, 100px); 
      gap: 10px; z-index: 9999; padding: 10px; background: rgba(0,0,0,0.75); 
      border: 2px solid #ccc; box-shadow: 0 0 15px #ccc; 
    }

    #chatOutput { 
      border: 1px solid #fff; padding: 15px; min-height: 160px; max-width: 600px; 
      margin: 20px 0; position: relative; overflow-y: auto; background: rgba(0,0,0,0.6); 
    }

    #shineBox { 
      position: absolute; top: 12px; right: 12px; padding: 4px 8px; 
      background: black; border: 1px solid #ccc; color: #ccc; font-size: 9px; cursor: pointer; 
    }

    #aiChatBox { 
      margin-top: 30px; padding: 20px; border: 1px solid #fff; width: 280px; background: black; 
    }

    canvas { border: 1px solid #ccc; background: #111; }
    #seriesViz { 
      background: transparent !important; 
      border: 2px solid #ccc; 
      box-shadow: 0 0 15px rgba(255,255,255,0.15); 
    }
  </style>
</head>
<body>

  <input id="numberInput" type="text" inputmode="numeric" placeholder="Enter: 45, 5, 9, 16, or 25">
  <button id="baseButton">.BASE.</button>
  <div id="upperBox">SYSTEM STATUS: ACTIVE</div>
  <div id="demo"></div>

  <h2 style="display:flex; align-items:center; gap:6px;">
    AHOL Chatbot <img src="ooo.png" style="width:22px; height:22px; image-rendering:crisp-edges;">
  </h2>

  <div id="uSpecialCenter" style="display:flex; gap:30px; justify-content:center; flex-wrap:wrap; margin: 30px 0;">
    <div style="display:flex; flex-direction:column; gap:10px;">
      <div class="uRow"><span>x</span><span>難</span></div>
      <div class="uRow"><span>c</span><span>金</span></div>
      <div class="uRow"><span>7</span><span>魂</span></div>
      <div class="uRow"><span>q</span><span>龍</span></div>
    </div>

    <div>
      <canvas id="seriesViz" width="260" height="260"></canvas>
    </div>

    <div style="display:flex; flex-direction:column; gap:10px;">
      <div class="uRow"><span>9</span><span>力</span></div>
      <div class="uRow"><span>t</span><span>火</span></div>
      <div class="uRow"><span>m</span><span>天</span></div>
      <div class="uRow"><span>z</span><span>神</span></div>
    </div>
  </div>

  <div id="chatOutput">
    <div id="shineBox">press 1 to shine CD...</div>
  </div>

  <div id="aiChatBox">
    <h3 style="text-shadow:0 0 10px #ccc;">AI Chatbox</h3>
    <canvas id="aiCanvas" width="240" height="240"></canvas>
  </div>

  <div style="margin-top:20px;">
    <input id="userInput" type="text" placeholder="{search}[cat] or {image}[cyberpunk]" 
           style="width:280px; padding:10px; background:black; color:#ccc; border:1px solid #ccc;">
  </div>

  <svg width="0" height="0">
    <filter id="rpxDrip">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.25" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <script>
    // ==================== SERIES VIZ ====================
    const sv = document.getElementById("seriesViz");
    const svctx = sv.getContext("2d");

    function loadImageToSeriesViz(query) {
      svctx.clearRect(0, 0, sv.width, sv.height);
      svctx.fillStyle = "#aaa";
      svctx.font = "14px monospace";
      svctx.fillText("Loading...", 85, 130);

      const seed = Math.abs(query.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 900) + 100;
      const imgUrl = `https://picsum.photos/id/${seed}/260/260`;

      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = imgUrl;

      img.onload = () => {
        svctx.drawImage(img, 0, 0, 260, 260);
      };

      img.onerror = () => {
        svctx.fillStyle = "#ff6666";
        svctx.fillText("Image failed", 70, 130);
      };
    }

    function drawSeriesDots() {
      svctx.clearRect(0, 0, sv.width, sv.height);
      svctx.fillStyle = "red"; svctx.shadowBlur = 15; svctx.shadowColor = "red";
      svctx.beginPath(); svctx.arc(80, 80, 9, 0, Math.PI*2); svctx.fill();
      svctx.fillStyle = "lime"; svctx.shadowColor = "lime";
      svctx.beginPath(); svctx.arc(180, 180, 9, 0, Math.PI*2); svctx.fill();
    }

    // ==================== CHAT COMMAND SYSTEM ====================
    const ChatLink = {
      chars: ["難", "金", "魂", "龍", "力", "火", "天", "神"],

      parse(msg) {
        const cmdMatch = msg.match(/\{([^}]+)\}/);
        const dataMatch = msg.match(/\[([^\]]+)\]/);
        return {
          command: cmdMatch ? cmdMatch[1].trim().toLowerCase() : null,
          payload: dataMatch ? dataMatch[1].trim() : null
        };
      },

      async dispatch(command, payload) {
        if (!payload) return "Need [payload]";

        if (command === "search" || command === "image" || command === "viz") {
          loadImageToSeriesViz(payload);
          return `Showing: ${payload}`;
        }

        if (command === "clear" && payload === "demo") {
          document.getElementById("demo").innerHTML = "";
          return "Demo grid cleared.";
        }
        return "Command received.";
      }
    };

    function appendToChat(role, msg) {
      const chat = document.getElementById("chatOutput");
      const div = document.createElement("div");
      div.innerHTML = `<b>${role}:</b> ${msg}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById("userInput").addEventListener("keydown", async (e) => {
      if (e.key === "Enter") {
        const msg = e.target.value.trim();
        if (!msg) return;

        appendToChat("You", msg);
        const { command, payload } = ChatLink.parse(msg);
        const response = await ChatLink.dispatch(command, payload);
        appendToChat("System", response);

        e.target.value = "";
      }
    });

    // Initial state
    drawSeriesDots();
  </script>
</body>
</html>
