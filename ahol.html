<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      padding: 20px;
      position: relative;
    }

    #chatOutput {
      border: 1px solid #fff;
      padding: 10px;
      min-height: 150px;
      max-width: 600px;
      position: relative;
      overflow: hidden;
    }

    #convCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    #vbnPhoto {
      width: 180px;
      border-radius: 10px;
      margin-bottom: 10px;
      filter: url(#rpxDrip);
      animation: rpxFlow 2.2s infinite ease-in-out;
      position: relative;
      z-index: 2;
    }

    @keyframes rpxFlow {
      0% { transform: translateY(0px); }
      50% { transform: translateY(4px); }
      100% { transform: translateY(0px); }
    }

    #userInput {
      margin-top: 20px;
      padding: 10px;
      width: 300px;
      background: #222;
      color: #0f0;
      border: 1px solid #0f0;
    }

    #uSpecialCenter {
      position: absolute;
      top: 0px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      background: transparent;
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      overflow-y: overlay;
      pointer-events: auto;
      z-index: 999;
    }

    .uRow {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      border-bottom: 1px solid #444;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <svg width="0" height="0">
    <filter id="rpxDrip">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.25" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <button id="baseButton" onclick="goToBase()">.BASE.</button>

  <div id="chatOutput">
    <canvas id="convCanvas"></canvas>

    <!-- ⭐ NEW: jr.xxyy vertex image -->
    <img id="vertexImage" src="jrxxyy.png" style="display:none;">

    <img id="vbnPhoto" src="vbn.png" alt="vbn photo">
  </div>

  <script>
    document.getElementById("vbnPhoto").addEventListener("load", function() {
        console.log("vbn photo loaded inside chatbox");
    });
  </script>

  <input id="userInput" placeholder="Type to activate AHOL...">

  <script>
    function goToBase() {
      window.location.href = "https://htmlpreview.github.io/?https://github.com/alienware51007-collab/AHOL/blob/main/globe.html";
    }

    const ChatBot = {
      speakQueue: [],
      active: false,

      loadScript(lines) {
        this.speakQueue.push(...lines);
        if (!this.active) this.run();
      },

      run() {
        this.active = true;

        if (this.speakQueue.length === 0) {
          this.active = false;
          return;
        }

        const line = this.speakQueue.shift();
        this.output(line);

        setTimeout(() => this.run(), 1200);
      },

      output(text) {
        const box = document.getElementById("chatOutput");
        if (box) {
          const p = document.createElement("p");
          p.textContent = text;
          p.style.position = "relative";
          p.style.zIndex = "3";
          box.appendChild(p);
        }
      }
    };

    const ChatScript = [
      "AHOL system initializing...",
      "Boot sequence complete.",
      "DreamTech interface online.",
      "Monitoring environment...",
      "Standing by for next directive."
    ];

    let chatbotEnabled = false;

    function activateChatBot() {
      if (!chatbotEnabled) {
        chatbotEnabled = true;
        ChatBot.loadScript(ChatScript);
      }
    }

    const inputBox = document.getElementById("userInput");
    inputBox.addEventListener("input", () => {
      activateChatBot();
    });
  </script>

  <!-- ⭐ CONVERGENCE BACKGROUND WITH jr.xxyy VERTEX IMAGE -->
  <script>
    const convCanvas = document.getElementById("convCanvas");
    const ctx = convCanvas.getContext("2d");
    const vertexImg = document.getElementById("vertexImage");

    function resizeConvCanvas() {
      convCanvas.width = document.getElementById("chatOutput").offsetWidth;
      convCanvas.height = document.getElementById("chatOutput").offsetHeight;
    }
    resizeConvCanvas();
    window.addEventListener("resize", resizeConvCanvas);

    let W = convCanvas.width;
    let H = convCanvas.height;
    let cx = W / 2;
    let cy = H / 2;

    const R1 = 4 * Math.PI;
    const R2 = 3.44;

    function complexTerm(k) {
      const mag = 1 / (k * k);
      const theta = 0.3 * k;
      return {
        re: mag * Math.cos(theta),
        im: mag * Math.sin(theta)
      };
    }

    function norm(z) {
      return Math.sqrt(z.re * z.re + z.im * z.im);
    }

    function add(z1, z2) {
      return { re: z1.re + z2.re, im: z1.im + z2.im };
    }

    function drawDot(radius, angle, color = "#fff", size = 2) {
      const x = cx + radius * Math.cos(angle);
      const y = cy + radius * Math.sin(angle);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, 2 * Math.PI);
      ctx.fill();
    }

    function setBlendMode(mode) {
      ctx.globalCompositeOperation = mode;
    }

    let n = 1;
    let S = { re: 0, im: 0 };
    let angleBase = 0;

    function animateConvergence() {
      W = convCanvas.width;
      H = convCanvas.height;
      cx = W / 2;
      cy = H / 2;

      const a_n = complexTerm(n);
      S = add(S, a_n);
      const r = norm(S);

      angleBase += 0.15;

      ctx.clearRect(0, 0, W, H);

      /* ⭐ Draw jr.xxyy at center */
      const imgSize = 140;
      ctx.globalCompositeOperation = "normal";
      ctx.drawImage(vertexImg, cx - imgSize/2, cy - imgSize/2, imgSize, imgSize);

      /* ⭐ Blend dots BEHIND jr.xxyy */
      setBlendMode("lighter");

      drawDot(40, angleBase, "#fff", 2);

      const scaledR = Math.min(r * 8, Math.min(W, H) / 2);
      drawDot(scaledR, angleBase + 1.0, "#ccc", 3);

      const eps = 0.15;
      if (Math.abs(r - R1) < eps) {
        drawDot(100, angleBase + 2.0, "#0ff", 5);
      }
      if (Math.abs(r - R2) < eps) {
        drawDot(100, angleBase - 2.0, "#f0f", 5);
      }

      n++;
      if (n < 800) {
        requestAnimationFrame(animateConvergence);
      }
    }

    vertexImg.onload = () => animateConvergence();
  </script>

</body>
</html>
