<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Chatbot + AI Image Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: url("jrxxyy.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #fff;
      font-family: monospace;
      padding: 20px;
      position: relative;
    }

    #chatOutput {
      border: 1px solid #fff;
      padding: 10px;
      min-height: 150px;
      max-width: 600px;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
    }

    #convCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    #vbnPhoto {
      width: 133px;
      border-radius: 10px;
      margin-bottom: 10px;
      filter: url(#rpxDrip);
      animation: rpxFlow 2.2s infinite ease-in-out;
      position: relative;
      z-index: 2;
    }

    @keyframes rpxFlow {
      0% { transform: translateY(0px); }
      50% { transform: translateY(4px); }
      100% { transform: translateY(0px); }
    }

    #userInput {
      margin-top: 20px;
      padding: 10px;
      width: 300px;
      background: #222;
      color: #0f0;
      border: 1px solid #0f0;
      display: block;
    }

    #imagePrompt {
      margin-top: 10px;
      padding: 10px;
      width: 300px;
      background: #111;
      color: #0ff;
      border: 1px solid #0ff;
      display: inline-block;
    }

    #generateImage {
      padding: 10px 16px;
      margin-left: 8px;
      background: #0ff;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #generateImage:hover {
      background: #0cc;
    }

    #imageCanvas {
      border: 1px solid #0ff;
      width: 600px;
      height: 320px;
      background: rgba(0, 0, 0, 0.6);
      display: block;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <svg width="0" height="0">
    <filter id="rpxDrip">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.25" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <h2>AHOL Chatbot + DreamTech Image Synth</h2>

  <div id="chatOutput">
    <canvas id="convCanvas"></canvas>
    <img id="vertexImage" src="jrxxyy.png" style="display:none;">
    <img id="vbnPhoto" src="vbn.png" alt="vbn photo">
  </div>

  <input id="userInput" placeholder="Type to activate AHOL...">
  <input id="imagePrompt" placeholder="Describe your image...">
  <button id="generateImage">GENERATE</button>
  <canvas id="imageCanvas"></canvas>

  <!-- JR.XXYY BETA base texture -->
  <img id="tex_jr" src="JR.XXYY.png" style="display:none;">

  <!-- AI IMAGE GENERATOR (JR.XXYY ALWAYS REFRESHES) -->
  <script>
    const imgCanvas = document.getElementById("imageCanvas");
    const imgCtx = imgCanvas.getContext("2d");

    imgCanvas.width = imgCanvas.offsetWidth;
    imgCanvas.height = imgCanvas.offsetHeight;

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pickPalette(prompt) {
      const p = prompt.toLowerCase();
      if (p.includes("neon") || p.includes("cyber")) {
        return ["#00ffcc", "#00ff00", "#ff00ff", "#0033ff"];
      }
      if (p.includes("fire") || p.includes("lava")) {
        return ["#ff3300", "#ff9900", "#ffff00", "#660000"];
      }
      if (p.includes("space") || p.includes("galaxy")) {
        return ["#ffffff", "#00ccff", "#9900ff", "#000022"];
      }
      if (p.includes("forest") || p.includes("nature")) {
        return ["#004400", "#00aa44", "#88ff88", "#223300"];
      }
      return ["#00ffff", "#ff00ff", "#ffffff", "#222222"];
    }

    function generateImageFromPrompt(prompt) {
      const w = imgCanvas.width;
      const h = imgCanvas.height;

      imgCtx.clearRect(0, 0, w, h);

      const baseImg = document.getElementById("tex_jr");
      imgCtx.globalAlpha = 1.0;
      imgCtx.drawImage(baseImg, 0, 0, w, h);

      const palette = pickPalette(prompt);

      const grad = imgCtx.createRadialGradient(
        w / 2, h / 2, 10,
        w / 2, h / 2, Math.max(w, h) / 2
      );
      grad.addColorStop(0, palette[0]);
      grad.addColorStop(0.5, palette[1]);
      grad.addColorStop(1, "rgba(0,0,0,0.4)");

      imgCtx.globalAlpha = 0.35;
      imgCtx.fillStyle = grad;
      imgCtx.fillRect(0, 0, w, h);

      imgCtx.globalAlpha = 0.5;
      const layers = 20;
      for (let i = 0; i < layers; i++) {
        const color = palette[Math.floor(Math.random() * palette.length)];
        imgCtx.strokeStyle = color;
        imgCtx.lineWidth = randomBetween(1, 3);

        imgCtx.beginPath();
        const cx = randomBetween(0, w);
        const cy = randomBetween(0, h);
        const radius = randomBetween(20, Math.min(w, h) / 3);

        const spikes = Math.floor(randomBetween(4, 10));
        for (let s = 0; s <= spikes; s++) {
          const angle = (s / spikes) * Math.PI * 2;
          const rx = cx + Math.cos(angle) * radius;
          const ry = cy + Math.sin(angle) * radius;
          if (s === 0) imgCtx.moveTo(rx, ry);
          else imgCtx.lineTo(rx, ry);
        }
        imgCtx.closePath();
        imgCtx.stroke();
      }

      imgCtx.globalAlpha = 1.0;
      imgCtx.fillStyle = "#ffffff";
      imgCtx.font = "12px monospace";
      imgCtx.fillText(prompt, 10, h - 10);
    }

    const generateBtn = document.getElementById("generateImage");

    generateBtn.addEventListener("click", () => {
      generateImageFromPrompt("JR.XXYY BETA");
    });

    generateImageFromPrompt("JR.XXYY BETA");
  </script>

</body>
</html>
