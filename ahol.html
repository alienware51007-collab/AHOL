<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Chatbot + AI Image Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ⭐ ORIGINAL BACKGROUND — UNCHANGED */
    body {
      background: url("jrxxyy.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #fff;
      font-family: monospace;
      padding: 20px;
      position: relative;
    }

    /* ✨ NEON GRID OVERLAY WITH MOTION BLUR + GLOW PULSE */
    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0,255,170,0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,170,0.10) 1px, transparent 1px),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 14px);
      background-size: 60px 60px, 60px 60px, 140px 140px;
      filter: blur(2px) brightness(1.1);
      animation: zoomPattern 16s ease-in-out infinite alternate,
                 glowPulse 6s ease-in-out infinite;
    }

    @keyframes zoomPattern {
      0% { transform: scale(1); }
      100% { transform: scale(1.16); }
    }

    @keyframes glowPulse {
      0%, 100% { filter: blur(2px) brightness(1.1); }
      50% { filter: blur(4px) brightness(1.4); }
    }

    body > * {
      position: relative;
      z-index: 1;
    }

    /* ⭐ SCROLL REVEAL ANIMATION */
    .scrollReveal {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
      transition: all 0.8s ease-out;
    }
    .scrollReveal.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* ⭐ SHINE FLASH ANIMATION */
    @keyframes shineFlash {
      0% { opacity:1; box-shadow:0 0 6px #0f0; }
      50% { opacity:1; box-shadow:0 0 22px #0f0; }
      100% { opacity:0; box-shadow:0 0 0 transparent; }
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #0f0;
    }

    #baseButton {
      padding: 8px 20px;
      background: black;
      color: #0f0;
      border: 1px solid #0f0;
      cursor: pointer;
      margin-bottom: 20px;
      transition: 0.2s;
    }
    #baseButton:hover {
      box-shadow: 0 0 12px #0f0;
    }

    .uRow span {
      display: inline-block;
      font-size: 22px;
      padding: 4px 6px;
      color: #0f0;
      text-shadow: 0 0 6px #0f0;
      transition: 0.2s;
    }
    .uRow span:hover {
      transform: scale(1.25);
      text-shadow: 0 0 12px #0f0;
    }

    svg {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>

  <svg width="0" height="0">
    <filter id="rpxDrip">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.25" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <button id="baseButton" onclick="goToBase()">.BASE.</button>

  <script>
    function goToBase() {
      window.location.href = "https://alienware51007-collab.github.io/AHOL/Oppeenn.html";
    }
  </script>

  <h2>AHOL Chatbot</h2>

  <div id="uSpecialCenter" style="display:flex; gap:20px;">

    <div class="ribbon-col left-col" style="display:flex; flex-direction:column; gap:10px;">
      <div class="uRow"><span>x</span><span>難</span></div>
      <div class="uRow"><span>c</span><span>金</span></div>
      <div class="uRow"><span>7</span><span>魂</span></div>
      <div class="uRow"><span>q</span><span>龍</span></div>
    </div>

    <div class="ribbon-col center-col">
      <canvas id="seriesViz" width="260" height="260"></canvas>
    </div>

    <div class="ribbon-col right-col" style="display:flex; flex-direction:column; gap:10px;">
      <div class="uRow"><span>9</span><span>力</span></div>
      <div class="uRow"><span>t</span><span>火</span></div>
      <div class="uRow"><span>m</span><span>天</span></div>
      <div class="uRow"><span>z</span><span>神</span></div>
    </div>

  </div>

  <!-- ⭐ CHATBOX WITH SCROLL REVEAL -->
  <div id="chatOutput" class="scrollReveal" style="
      border:1px solid #fff;
      padding:10px;
      min-height:150px;
      max-width:600px;
      margin-top:20px;
      margin-bottom:20px;
      position:relative;
      overflow:hidden;
  ">
    <img id="vbnPhoto" class="scrollReveal" src="vbn.png" alt="vbn photo" style="
      width:120px;
      filter:url(#rpxDrip);
      position:absolute;
      right:10px;
      bottom:10px;
    ">
  </div>

  <!-- ⭐ SHINE BOX (UPPER RIGHT, OUTSIDE CHATBOX) -->
  <div id="shineBox" style="
    position:absolute;
    top:20px;
    right:20px;
    padding:8px 12px;
    background:black;
    border:1px solid #0f0;
    color:#0f0;
    font-family:monospace;
    font-size:14px;
    text-shadow:0 0 6px #0f0;
    z-index:5;
  ">
    press 1 to shine CD...
  </div>

  <script>
    document.getElementById("vbnPhoto").addEventListener("load", () => {
      console.log("vbn photo loaded inside chatbox");
    });
  </script>

  <input id="userInput" placeholder="Type to activate AHOL..." style="
    width:300px;
    padding:10px;
    border:1px solid #0f0;
    background:black;
    color:#0f0;
  ">

  <!-- ⭐ SHINE BOX KEY LISTENER -->
  <script>
  document.addEventListener("keydown", (e) => {
    if (e.key === "1") {
      const box = document.getElementById("shineBox");
      if (!box) return;

      box.style.animation = "shineFlash 0.8s ease-out forwards";

      setTimeout(() => {
        box.style.display = "none";
      }, 800);
    }
  });
  </script>

</body>
</html>
