<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL Chatbot + AI Image Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: url("jrxxyy.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #fff;
      font-family: monospace;
      padding: 20px;
      position: relative;
    }

    #chatOutput {
      border: 1px solid #fff;
      padding: 10px;
      min-height: 150px;
      max-width: 600px;
      position: relative;
      overflow: hidden;
      margin-bottom: 20px;
    }

    #convCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    #vbnPhoto {
      width: 133px;
      border-radius: 10px;
      margin-bottom: 10px;
      filter: url(#rpxDrip);
      animation: rpxFlow 2.2s infinite ease-in-out;
      position: relative;
      z-index: 2;
    }

    @keyframes rpxFlow {
      0% { transform: translateY(0px); }
      50% { transform: translateY(4px); }
      100% { transform: translateY(0px); }
    }

    #userInput {
      margin-top: 20px;
      padding: 10px;
      width: 300px;
      background: #222;
      color: #0f0;
      border: 1px solid #0f0;
      display: block;
    }

    /* ⭐ AI Image Prompt + Button */
    #imagePrompt {
      margin-top: 10px;
      padding: 10px;
      width: 300px;
      background: #111;
      color: #0ff;
      border: 1px solid #0ff;
      display: inline-block;
    }

    #generateImage {
      padding: 10px 16px;
      margin-left: 8px;
      background: #0ff;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #generateImage:hover {
      background: #0cc;
    }

    #uSpecialCenter {
      position: absolute;
      top: 0px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      background: transparent;
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      overflow-y: overlay;
      pointer-events: auto;
      z-index: 999;
    }

    .uRow {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      border-bottom: 1px solid #444;
      cursor: pointer;
    }

    /* ⭐ Ribbon Visualization */
    .ribbon-col {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left-col, .right-col {
      width: 120px;
    }

    .center-col {
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #seriesViz {
      width: 100%;
      height: 320px;
      background: transparent;
    }

    /* ⭐ AI Image Canvas */
    #imageCanvas {
      border: 1px solid #0ff;
      width: 600px;
      height: 320px;
      background: rgba(0, 0, 0, 0.6);
      display: block;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <svg width="0" height="0">
    <filter id="rpxDrip">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.25" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="35" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <button id="baseButton" onclick="goToBase()">.BASE.</button>
  <h2>AHOL Chatbot + DreamTech Image Synth</h2>

  <!-- ⭐ RIBBON WITH CENTER VISUALIZATION INSERTED -->
  <div id="uSpecialCenter">

    <!-- LEFT COLUMN -->
    <div class="ribbon-col left-col">
      <div class="uRow"><span>x</span><span>難</span></div>
      <div class="uRow"><span>c</span><span>金</span></div>
      <div class="uRow"><span>7</span><span>7</span></div>
      <div class="uRow"><span>7</span><span>7</span></div>
      <div class="uRow"><span>7</span><span>7</span></div>
      <div class="uRow"><span>8</span><span>8</span></div>
      <div class="uRow"><span>8</span><span>8</span></div>
    </div>

    <!-- ⭐ CENTER VISUALIZATION COLUMN -->
    <div class="ribbon-col center-col">
      <canvas id="seriesViz"></canvas>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="ribbon-col right-col">
      <div class="uRow"><span>手</span></div>
      <div class="uRow"><span>田</span></div>
      <div class="uRow"><span>水</span></div>
      <div class="uRow"><span>口</span></div>
      <div class="uRow"><span>廿</span></div>
      <div class="uRow"><span>卜</span></div>
      <div class="uRow"><span>山</span></div>
      <div class="uRow"><span>戈</span></div>
    </div>

  </div>

  <div id="chatOutput">
    <canvas id="convCanvas"></canvas>

    <img id="vertexImage" src="jrxxyy.png" style="display:none;">
    <img id="vbnPhoto" src="vbn.png" alt="vbn photo">
  </div>

  <script>
    document.getElementById("vbnPhoto").addEventListener("load", function() {
        console.log("vbn photo loaded inside chatbox");
    });
  </script>

  <!-- Chat input -->
  <input id="userInput" placeholder="Type to activate AHOL...">

  <!-- ⭐ AI Image Prompt + Button -->
  <input id="imagePrompt" placeholder="Describe your image...">
  <button id="generateImage">GENERATE</button>

  <!-- ⭐ AI Image Canvas -->
  <canvas id="imageCanvas"></canvas>

  <script>
    function goToBase() {
      window.location.href = "https://htmlpreview.github.io/?https://github.com/alienware51007-collab/AHOL/blob/main/globe.html";
    }

    const ChatBot = {
      speakQueue: [],
      active: false,

      loadScript(lines) {
        this.speakQueue.push(...lines);
        if (!this.active) this.run();
      },

      run() {
        this.active = true;

        if (this.speakQueue.length === 0) {
          this.active = false;
          return;
        }

        const line = this.speakQueue.shift();
        this.output(line);

        setTimeout(() => this.run(), 1200);
      },

      output(text) {
        const box = document.getElementById("chatOutput");
        if (box) {
          const p = document.createElement("p");
          p.textContent = text;
          p.style.position = "relative";
          p.style.zIndex = "3";
          box.appendChild(p);
        }
      }
    };

    const ChatScript = [
      "AHOL system initializing...",
      "Boot sequence complete.",
      "DreamTech interface online.",
      "Monitoring environment...",
      "Standing by for next directive."
    ];

    let chatbotEnabled = false;

    function activateChatBot() {
      if (!chatbotEnabled) {
        chatbotEnabled = true;
        ChatBot.loadScript(ChatScript);
      }
    }

    const inputBox = document.getElementById("userInput");
    inputBox.addEventListener("input", () => {
      activateChatBot();
    });
  </script>

  <!-- ⭐ TWO-PANEL VISUALIZATION SCRIPT WITH DRAGGABLE POINTS -->
  <script>
    const canvas = document.getElementById("seriesViz");
    const ctx = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    let aPoints = [];
    let sPoints = [];
    let dragPoint = null;
    let isDragging = false;

    const seq = ["難","c","金",7,7,7,8,8];

    const numericSeq = seq.map((v, i) => {
        if (typeof v === "number") return v;
        return 10 - i;
    });

    function drawSeriesViz() {
        const w = canvas.width;
        const h = canvas.height;
        const mid = w * 0.5;

        ctx.clearRect(0, 0, w, h);

        /* ⭐ Draw aₖ curve based on draggable points */
        ctx.strokeStyle = "orange";
        ctx.lineWidth = 2;
        ctx.beginPath();

        aPoints.forEach((pt, i) => {
            if (i === 0) ctx.moveTo(pt.x, pt.y);
            else ctx.lineTo(pt.x, pt.y);
        });
        ctx.stroke();

        /* Draw aₖ points */
        ctx.fillStyle = "red";
        aPoints.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
            ctx.fill();
        });

        /* ⭐ Draw Sₙ curve based on draggable points */
        ctx.strokeStyle = "lime";
        ctx.lineWidth = 2;
        ctx.beginPath();

        sPoints.forEach((pt, i) => {
            if (i === 0) ctx.moveTo(pt.x, pt.y);
            else ctx.lineTo(pt.x, pt.y);
        });
        ctx.stroke();

        /* Draw Sₙ points */
        ctx.fillStyle = "red";
        sPoints.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    /* ⭐ Initialize points */
    function initPoints() {
        const w = canvas.width;
        const h = canvas.height;
        const mid = w * 0.5;

        aPoints = [];
        sPoints = [];

        numericSeq.forEach((v, i) => {
            const x = (i / (numericSeq.length - 1)) * (mid - 40) + 20;
            const y = h - (v / Math.max(...numericSeq)) * (h - 40) - 20;
            aPoints.push({ x, y });
        });

        const partialSums = numericSeq.map((v, i) =>
            numericSeq.slice(0, i + 1).reduce((a, b) => a + b, 0)
        );

        partialSums.forEach((v, i) => {
            const x = mid + (i / (partialSums.length - 1)) * (mid - 40) + 20;
            const y = h - (v / Math.max(...partialSums)) * (h - 40) - 20;
            sPoints.push({ x, y });
        });

        drawSeriesViz();
    }

    initPoints();

    /* ⭐ DRAGGABLE POINT SYSTEM */
    canvas.addEventListener("mousedown", (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        [...aPoints, ...sPoints].forEach(pt => {
            const dx = mx - pt.x;
            const dy = my - pt.y;
            if (Math.sqrt(dx*dx + dy*dy) < 10) {
                dragPoint = pt;
                isDragging = true;
            }
        });
    });

    canvas.addEventListener("mousemove", (e) => {
        if (!isDragging || !dragPoint) return;

        const rect = canvas.getBoundingClientRect();
        dragPoint.x = e.clientX - rect.left;
        dragPoint.y = e.clientY - rect.top;

        drawSeriesViz();
    });

    canvas.addEventListener("mouseup", () => {
        isDragging = false;
        dragPoint = null;
    });
  </script>

  <!-- ⭐ AI IMAGE GENERATOR -->
  <script>
    const imgCanvas = document.getElementById("imageCanvas");
    const imgCtx = imgCanvas.getContext("2d");

    imgCanvas.width = imgCanvas.offsetWidth;
    imgCanvas.height = imgCanvas.offsetHeight;

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pickPalette(prompt) {
      const p = prompt.toLowerCase();
      if (p.includes("neon") || p.includes("cyber")) {
        return ["#00ffcc", "#00ff00", "#ff00ff", "#0033ff"];
      }
      if (p.includes("fire") || p.includes("lava")) {
        return ["#ff3300", "#ff9900", "#ffff00", "#660000"];
      }
      if (p.includes("space") || p.includes("galaxy")) {
        return ["#ffffff", "#00ccff", "#9900ff", "#000022"];
      }
      if (p.includes("forest") || p.includes("nature")) {
        return ["#004400", "#00aa44", "#88ff88", "#223300"];
      }
      return ["#00ffff", "#ff00ff", "#ffffff", "#222222"];
    }

    function generateImageFromPrompt(prompt) {
      const w = imgCanvas.width;
      const h = imgCanvas.height;

      imgCtx.clearRect(0, 0, w, h);

      const palette = pickPalette(prompt);

      const grad = imgCtx.createRadialGradient(
        w / 2, h / 2, 10,
        w / 2, h / 2, Math.max(w, h) / 2
      );
      grad.addColorStop(0, palette[0]);
      grad.addColorStop(0.5, palette[1]);
      grad.addColorStop(1, "#000000");
      imgCtx.fillStyle = grad;
      imgCtx.fillRect(0, 0, w, h);

      const layers = 40;
      for (let i = 0; i < layers; i++) {
        const color = palette[Math.floor(Math.random() * palette.length)];
        imgCtx.strokeStyle = color;
        imgCtx.globalAlpha = randomBetween(0.2, 0.8);
        imgCtx.lineWidth = randomBetween(1, 4);

        imgCtx.beginPath();
        const cx = randomBetween(0, w);
        const cy = randomBetween(0, h);
        const radius = randomBetween(20, Math.min(w, h) / 2);

        const spikes = Math.floor(randomBetween(3, 12));
        for (let s = 0; s <= spikes; s++) {
          const angle = (s / spikes) * Math.PI * 2;
          const rx = cx + Math.cos(angle) * radius * randomBetween(0.5, 1.2);
          const ry = cy + Math.sin(angle) * radius * randomBetween(0.5, 1.2);
          if (s === 0) imgCtx.moveTo(rx, ry);
          else imgCtx.lineTo(rx, ry);
        }
        imgCtx.closePath();
        imgCtx.stroke();
      }

      imgCtx.globalAlpha = 1.0;
      imgCtx.fillStyle = "#ffffff";
      imgCtx.font = "12px monospace";
      imgCtx.fillText(prompt, 10, h - 10);
    }

    const promptInput = document.getElementById("imagePrompt");
    const generateBtn = document.getElementById("generateImage");

    generateBtn.addEventListener("click", () => {
      const prompt = promptInput.value.trim();
      if (!prompt) return;
      generateImageFromPrompt(prompt);
    });

    generateImageFromPrompt("initial hologram");
  </script>

  <!-- ⭐ CONVERGENCE BACKGROUND -->
  <script>
    const convCanvas = document.getElementById("convCanvas");
    const ctx2 = convCanvas.getContext("2d");
    const vertexImg = document.getElementById("vertexImage");

    function resizeConvCanvas() {
      convCanvas.width = document.getElementById("chatOutput").offsetWidth;
      convCanvas.height = document.getElementById("chatOutput").offsetHeight;
    }
    resizeConvCanvas();
    window.addEventListener("resize", resizeConvCanvas);

    let W = convCanvas.width;
    let H = convCanvas.height;
    let cx = W / 2;
    let cy = H / 2;

    const R1 = 4 * Math.PI;
    const R2 = 3.44;

    function complexTerm(k) {
      const mag = 1 / (k * k);
      const theta = 0.3 * k;
      return {
        re: mag * Math.cos(theta),
        im: mag * Math.sin(theta)
      };
    }

    function norm(z) {
      return Math.sqrt(z.re * z.re + z.im * z.im);
    }

    function add(z1, z2) {
      return { re: z1.re + z2.re, im: z1.im + z2.im };
    }

    function drawDot(radius, angle, color = "#fff", size = 2) {
      const x = cx + radius * Math.cos(angle);
      const y = cy + radius * Math.sin(angle);
      ctx2.fillStyle = color;
      ctx2.beginPath();
      ctx2.arc(x, y, size, 0, 2 * Math.PI);
      ctx2.fill();
    }

    function setBlendMode(mode) {
      ctx2.globalCompositeOperation = mode;
    }

    let n = 1;
    let S = { re: 0, im: 0 };
    let angleBase = 0;

    function animateConvergence() {
      W = convCanvas.width;
      H = convCanvas.height;
      cx = W / 2;
      cy = H / 2;

      const a_n = complexTerm(n);
      S = add(S, a_n);
      const r = norm(S);

      angleBase += 0.15;

      ctx2.clearRect(0, 0, W, H);

      const imgSize = 200;
      ctx2.globalCompositeOperation = "normal";
      ctx2.drawImage(vertexImg, cx - imgSize/2, cy - imgSize/2, imgSize, imgSize);

      setBlendMode("lighter");

      drawDot(40, angleBase, "#fff", 2);

      const scaledR = Math.min(r * 8, Math.min(W, H) / 2);
      drawDot(scaledR, angleBase + 1.0, "#ccc", 3);

      const eps = 0.15;
      if (Math.abs(r - R1) < eps) {
        drawDot(100, angleBase + 2.0, "#0ff", 5);
      }
      if (Math.abs(r - R2) < eps) {
        drawDot(100, angleBase - 2.0, "#f0f", 5);
      }

      n++;
      if (n < 800) {
        requestAnimationFrame(animateConvergence);
      }
    }

    vertexImg.onload = () => animateConvergence();
  </script>

</body>
</html>
