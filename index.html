<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CONart — Minimal Animation Gallery + 3D Function</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: #eee;
      font-family: monospace;
    }

    h2 {
      margin-bottom: 20px;
    }

    /* Gallery */
    #gallery {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    #gallery img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid #333;
      transition: border-color 0.2s;
    }

    #gallery img:hover {
      border-color: #666;
    }

    /* Canvas Area */
    #canvasArea {
      width: 400px;
      height: 400px;
      background: #222;
      position: relative;
      overflow: hidden;
      border: 2px solid #333;
    }

    #artImage {
      position: absolute;
      width: 200px;
      height: 200px;
      object-fit: contain;
      left: 100px;
      top: 100px;
      z-index: 10; /* stays above 3D function */
    }

    .formex {
      position: absolute;
      font-size: 11px;
      color: #ccc;
      z-index: 1;
      pointer-events: none;
    }

    #formex-tl { top: 4px; left: 6px; }
    #formex-tr { top: 4px; right: 6px; }
    #formex-bl { bottom: 4px; left: 6px; }
    #formex-br { bottom: 4px; right: 6px; }
  </style>
</head>

<body>

  <h2>CONart — Minimal Animation Gallery + 3D Function</h2>

  <!-- Gallery -->
  <div id="gallery">
    <img src="img1.png" onclick="CONart('img1')">
    <img src="img2.png" onclick="CONart('img2')">
    <img src="img3.png" onclick="CONart('img3')">
  </div>

  <!-- Canvas Area -->
  <div id="canvasArea">

    <!-- 3D function canvas -->
    <canvas id="func3d" width="400" height="400"
            style="position:absolute; left:0; top:0; z-index:1;"></canvas>

    <!-- Math formex in each corner -->
    <div id="formex-tl" class="formex">7xy / e^(x² + y²)</div>
    <div id="formex-tr" class="formex">7xy / e^(x² + y²)</div>
    <div id="formex-bl" class="formex">7xy / e^(x² + y²)</div>
    <div id="formex-br" class="formex">7xy / e^(x² + y²)</div>

    <!-- Central art image -->
    <img id="artImage" src="">
  </div>

  <script>
    // -----------------------------
    // STD Animation Engine (Minimal)
    // -----------------------------
    const STD = {
      objects: [],

      add(obj) {
        this.objects.push(obj);
      },

      clear() {
        this.objects = [];
      },

      animate() {
        for (const obj of STD.objects) {
          if (typeof obj.update === "function") {
            obj.update();
          }
        }
        requestAnimationFrame(STD.animate);
      }
    };

    requestAnimationFrame(STD.animate);

    // -----------------------------
    // 3D Function Renderer
    // -----------------------------
    function renderFunction3D() {
      const canvas = document.getElementById("func3d");
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;

      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, w, h);

      const centerX = w / 2;
      const centerY = h / 2;

      const step = 0.15;
      const zScale = 80;

      for (let x = -2; x <= 2; x += step) {
        for (let y = -2; y <= 2; y += step) {

          const r2 = x * x + y * y;
          const f = (7 * x * y) / Math.exp(r2);

          // isometric projection
          const sx = centerX + (x - y) * 40;
          const sy = centerY - f * zScale + (x + y) * 10;

          // grayscale based on height
          const val = Math.max(0, Math.min(255, 128 + f * 120));
          const gray = val | 0;

          ctx.fillStyle = `rgb(${gray},${gray},${gray})`;
          ctx.fillRect(sx, sy, 2, 2);
        }
      }
    }

    // Render once on load
    window.onload = () => {
      renderFunction3D();
    };

    // -----------------------------
    // CONart Controller
    // -----------------------------
    function CONart(id) {
      const art = document.getElementById("artImage");

      art.src = id + ".png";
      art.style.transform = "none";

      STD.clear();

      if (id === "img1") animateSpin(art);
      if (id === "img2") animatePulse(art);
      if (id === "img3") animateSlide(art);

      activateFormexAnimation();
    }

    // -----------------------------
    // Decisive Animation Functions
    // -----------------------------
    function animateSpin(el) {
      const obj = {
        angle: 0,
        update() {
          this.angle += 2;
          el.style.transform = `rotate(${this.angle}deg)`;
        }
      };
      STD.add(obj);
    }

    function animatePulse(el) {
      const obj = {
        scale: 1,
        dir: 1,
        update() {
          this.scale += 0.01 * this.dir;
          if (this.scale > 1.2 || this.scale < 0.8) this.dir *= -1;
          el.style.transform = `scale(${this.scale})`;
        }
      };
      STD.add(obj);
    }

    function animateSlide(el) {
      const obj = {
        x: 0,
        update() {
          this.x += 1;
          el.style.transform = `translateX(${this.x}px)`;
        }
      };
      STD.add(obj);
    }

    // -----------------------------
    // Formex Animation (subtle fade)
    // -----------------------------
    function activateFormexAnimation() {
      const labels = [
        document.getElementById("formex-tl"),
        document.getElementById("formex-tr"),
        document.getElementById("formex-bl"),
        document.getElementById("formex-br")
      ];

      const obj = {
        t: 0,
        update() {
          this.t += 0.03;
          const alpha = 0.6 + 0.4 * Math.sin(this.t);
          labels.forEach(l => {
            l.style.opacity = alpha.toFixed(2);
          });
        }
      };

      STD.add(obj);
    }
  </script>

</body>
</html>
