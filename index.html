<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AHOL — Minimal STD Base</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: #eee;
      font-family: monospace;
    }

    #testBox {
      width: 60px;
      height: 60px;
      background: #444;
      position: absolute;
      top: 40px;
      left: 20px;
    }
  </style>
</head>

<body>

  <h2>AHOL — Minimal STD Base</h2>
  <p>This is the clean foundation. STD animation engine is active.</p>

  <div id="testBox"></div>

  <script>
    // -----------------------------
    // STD Animation Engine (Minimal)
    // -----------------------------
    const STD = {
      objects: [],

      add(obj) {
        this.objects.push(obj);
      },

      animate() {
        for (const obj of STD.objects) {
          if (typeof obj.update === "function") {
            obj.update();
          }
        }
        requestAnimationFrame(STD.animate);
      }
    };

    requestAnimationFrame(STD.animate);

    // -----------------------------
    // Test Object (moves slowly)
    // -----------------------------
    const testBox = {
      el: null,
      x: 0,

      init() {
        this.el = document.getElementById("testBox");
      },

      update() {
        this.x += 0.3;
        this.el.style.transform = `translateX(${this.x}px)`;
      }
    };

    window.onload = () => {
      testBox.init();
      STD.add(testBox);
    };
  </script>

</body>
</html>
