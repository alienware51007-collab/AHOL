<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CONart — Minimal Animation Gallery + 3D Function</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: #eee;
      font-family: monospace;
    }

    h2 { margin-bottom: 20px; }

    #gallery {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    #gallery img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid #333;
      transition: border-color 0.2s;
    }

    #gallery img:hover { border-color: #666; }

    #canvasArea {
      width: 400px;
      height: 400px;
      background: #222;
      position: relative;
      overflow: hidden;
      border: 2px solid #333;
    }

    #artImage {
      position: absolute;
      width: 200px;
      height: 200px;
      object-fit: contain;
      left: 100px;
      top: 100px;
      z-index: 10;
    }

    .formex {
      position: absolute;
      font-size: 11px;
      color: #ccc;
      z-index: 1;
      pointer-events: none;
    }

    #formex-tl { top: 4px; left: 6px; }
    #formex-tr { top: 4px; right: 6px; }
    #formex-bl { bottom: 4px; left: 6px; }
    #formex-br { bottom: 4px; right: 6px; }

    .leb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      position: absolute;
      background: #fff;
      border: 2px solid #000;
      cursor: pointer;
      z-index: 20;
    }

    .leb.func { background: #ccc; }
    .leb.ring { background: #fff; }

    @keyframes vibrate {
      0% { transform: translate(0px, 0px); }
      25% { transform: translate(1px, -1px); }
      50% { transform: translate(-1px, 1px); }
      75% { transform: translate(1px, 1px); }
      100% { transform: translate(-1px, -1px); }
    }
  </style>
</head>

<body>

  <h2>CONart — Minimal Animation Gallery + 3D Function</h2>

  <button onclick="window.location.href='https://alienware51007-collab.github.io/AHOL/'">
    Back to AHOL
  </button>

  <br><br>
  <input id="searchBox" placeholder="Search images..." style="width:200px;">
  <button id="azureBtn">Find Image</button>

  <br><br>
  <textarea id="imageUrl" placeholder="Paste image URL or data:image/..." 
            rows="3" style="width:400px; font-size:12px;"></textarea>
  <br>
  <button id="loadImageBtn">Load Image (as main)</button>
  <button id="blendBtn">Blend with Current Image</button>

  <div id="gallery">
    <img src="img1.png" onclick="CONart('img1')">
    <img src="img2.png" onclick="CONart('img2')">
    <img src="img3.png" onclick="CONart('img3')">
  </div>

  <div id="canvasArea">
    <canvas id="func3d" width="400" height="400"
            style="position:absolute; left:0; top:0; z-index:1;"></canvas>

    <div id="formex-tl" class="formex">7xy / e^(x² + y²)</div>
    <div id="formex-tr" class="formex">7xy / e^(x² + y²)</div>
    <div id="formex-bl" class="formex">7xy / e^(x² + y²)</div>
    <div id="formex-br" class="formex">7xy / e^(x² + y²)</div>

    <img id="artImage" src="">
  </div>

  <script>
    // Azure / Bing search
    document.getElementById("azureBtn").onclick = () => {
      const q = document.getElementById("searchBox").value.trim();
      if (!q) return;
      window.open("https://www.bing.com/images/search?q=" + encodeURIComponent(q), "_blank");
    };

    // Load single image (becomes Image 1)
    document.getElementById("loadImageBtn").onclick = () => {
      let url = document.getElementById("imageUrl").value.trim();
      if (!url) return;

      if (url.startsWith("http://")) url = "https://" + url.slice(7);
      else if (url.startsWith("//")) url = "https:" + url;

      const art = document.getElementById("artImage");
      const temp = new Image();

      temp.onload = () => {
        art.style.animation = "none";
        art.style.transform = "none";
        STD.clear();
        art.src = url;
        art.style.animation = "vibrate 0.2s infinite";
      };
      temp.onerror = () => alert("Could not load image.");
      temp.src = url;
    };

    // Blend current image (Image 1) + URL in box (Image 2)
    document.getElementById("blendBtn").onclick = async () => {
      const art = document.getElementById("artImage");
      if (!art.src || art.src === window.location.href) {
        alert("First load or select an image (this will be Image 1)");
        return;
      }

      let url2 = document.getElementById("imageUrl").value.trim();
      if (!url2) {
        alert("Paste a second image URL in the box above");
        return;
      }

      if (url2.startsWith("http://")) url2 = "https://" + url2.slice(7);
      else if (url2.startsWith("//")) url2 = "https:" + url2;

      try {
        const img1 = await loadImage(art.src);
        const img2 = await loadImage(url2);

        const canvas = document.createElement("canvas");
        canvas.width = Math.max(img1.width, img2.width);
        canvas.height = Math.max(img1.height, img2.height);
        const ctx = canvas.getContext("2d");

        // Draw Image 1
        ctx.drawImage(img1, 0, 0, canvas.width, canvas.height);

        // Blend Image 2
        ctx.globalCompositeOperation = "overlay";
        ctx.globalAlpha = 0.7;
        ctx.drawImage(img2, 0, 0, canvas.width, canvas.height);

        // Light AI-style boost
        ctx.globalCompositeOperation = "source-over";
        ctx.filter = "contrast(1.25) saturate(1.4) hue-rotate(12deg)";
        ctx.drawImage(canvas, 0, 0);
        ctx.filter = "none";

        art.style.animation = "none";
        art.style.transform = "none";
        STD.clear();
        art.src = canvas.toDataURL("image/png");
        art.style.animation = "vibrate 0.2s infinite";

      } catch (err) {
        alert("Blend failed – try a different second image URL");
        console.error(err);
      }
    };

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    // Original engine
    const STD = {
      objects: [],
      add(o){ this.objects.push(o); },
      clear(){ this.objects = []; },
      animate(){
        for(const o of STD.objects){
          if(o.update) o.update();
        }
        requestAnimationFrame(STD.animate);
      }
    };
    requestAnimationFrame(STD.animate);

    function renderFunction3D() {
      const canvas = document.getElementById("func3d");
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, w, h);
      const cx = w/2, cy = h/2;
      const step = 0.15, zScale = 80;
      for(let x=-2; x<=2; x+=step){
        for(let y=-2; y<=2; y+=step){
          const f = (7*x*y)/Math.exp(x*x+y*y);
          const sx = cx + (x-y)*40;
          const sy = cy - f*zScale + (x+y)*10;
          const g = Math.max(0, Math.min(255, 128 + f*120))|0;
          ctx.fillStyle = `rgb(${g},${g},${g})`;
          ctx.fillRect(sx, sy, 2, 2);
        }
      }
    }

    const canvasArea = document.getElementById("canvasArea");
    const LEB = {
      make(x, y, cls){
        const d = document.createElement("div");
        d.className = "leb " + cls;
        d.style.left = x + "px";
        d.style.top  = y + "px";
        canvasArea.appendChild(d);
        d.onmousedown = e => {
          const ox = e.offsetX;
          const oy = e.offsetY;
          document.onmousemove = m => {
            d.style.left = (m.pageX - canvasArea.offsetLeft - ox) + "px";
            d.style.top  = (m.pageY - canvasArea.offsetTop  - oy) + "px";
          };
          document.onmouseup = () => document.onmousemove = null;
        };
      }
    };

    window.onload = () => {
      renderFunction3D();
      LEB.make(180, 40,  "ring");
      LEB.make(300, 180, "ring");
      LEB.make(180, 320, "ring");
      LEB.make(60,  180, "ring");
      LEB.make(200, 200, "func");
      LEB.make(260, 140, "func");
      LEB.make(140, 260, "func");
      LEB.make(260, 260, "func");
    };

    function CONart(id){
      const art = document.getElementById("artImage");
      art.src = id + ".png";
      art.style.transform = "none";
      art.style.animation = "none";
      STD.clear();
      if(id === "img1") animateSpin(art);
      if(id === "img2") animatePulse(art);
      if(id === "img3") animateSlide(art);
      activateFormexAnimation();
    }

    function animateSpin(el){
      STD.add({
        angle: 0,
        update(){ this.angle += 2; el.style.transform = `rotate(${this.angle}deg)`; }
      });
    }

    function animatePulse(el){
      STD.add({
        scale: 1, dir: 1,
        update(){
          this.scale += 0.01 * this.dir;
          if(this.scale > 1.2 || this.scale < 0.8) this.dir *= -1;
          el.style.transform = `scale(${this.scale})`;
        }
      });
    }

    function animateSlide(el){
      STD.add({
        x: 0,
        update(){ this.x += 1; el.style.transform = `translateX(${this.x}px)`; }
      });
    }

    function activateFormexAnimation(){
      const L = ["formex-tl","formex-tr","formex-bl","formex-br"]
        .map(id => document.getElementById(id));
      STD.add({
        t: 0,
        update(){
          this.t += 0.03;
          const a = 0.6 + 0.4 * Math.sin(this.t);
          L.forEach(l => { if (l) l.style.opacity = a.toFixed(2); });
        }
      });
    }
  </script>

</body>
</html>
